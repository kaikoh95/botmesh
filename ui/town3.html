<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高町旅館 · Takamachi Inn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0a07; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const W = 600, H = 700;
const WALL_T = 10;
const DOOR_W = 40;
const ROOM_W = 200, ROOM_H = 220;
const GRID_X = 90, GRID_Y = 60;
const GAP = WALL_T;

const PAL = {
  bg: 0x0d0a07,
  wall: 0x3a2010,
  wallDark: 0x2a1808,
  wallInner: 0x4a2e18,
  floor1: 0x7a4e28,
  floor2: 0x8b5e30,
  floor3: 0x6b3e20,
  floorWarm1: 0x8b5e30,
  floorWarm2: 0x9a6e3a,
  floorDark1: 0x5c3818,
  floorDark2: 0x6b4520,
  floorStone1: 0x4a3828,
  floorStone2: 0x5a4838,
  shadow: 0x1a0e04,
  lantern: 0xf0a030,
  bookshelf: 0x5c3a18,
  barrel: 0x6b4226,
  barrelRing: 0x3a2a10,
  table: 0x8b6030,
  tableLeg: 0x5c3a18,
  skin: 0xe8b878,
  forgeGlow: 0xe05020,
  hudBg: 0x0d0a07,
};

const BOOK_COLORS = [0x4a6a8a, 0x8a2020, 0x2a6a3a, 0x7a5a18, 0x6a3a6a, 0x3a5a7a, 0x9a5a2a, 0x5a2a4a];
const NPC_COLORS = {
  scholar: { robe: 0x2a2040, hair: 0x3a2010 },
  innkeeper: { shirt: 0x8a4020, apron: 0xd0c0a0, hair: 0x1a1010 },
  patron: { shirt: 0x4a6a3a, hair: 0x6a3a10 },
  worker: { shirt: 0x5a4a3a, hair: 0x2a1808 },
  smith: { shirt: 0x3a3a3a, hair: 0x1a0e04 },
};

// Seeded RNG for deterministic grain/knots
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function roomPos(col, row) {
  return {
    x: GRID_X + col * (ROOM_W + WALL_T),
    y: GRID_Y + row * (ROOM_H + WALL_T)
  };
}

class TakamachiScene extends Phaser.Scene {
  constructor() { super('TakamachiScene'); }

  create() {
    this.lanternGlows = [];
    this.forgeGlows = [];
    this.npcs = [];
    this.pageRect = null;
    this.dustMotes = [];
    this.emberGlow = null;

    // Iter 5: draw exterior first (behind everything)
    this.drawExterior();
    this.drawAllRooms();
    // Iter 3: room atmosphere layers
    this.drawAtmosphere();
    this.drawWallsAndDoors();
    // Iter 5: moonlight and vignette (on top of walls)
    this.drawCompositionPolish();
    this.drawHUD();
    this.startAnimations();

    // ── SSE: live event stream ──
    this.connectSSE();
  }

  // Iter 1: enhanced floor planks with grain, knots, and end lines
  drawFloorPlanks(g, x, y, w, h, c1, c2, plankH, roomSeed) {
    plankH = plankH || 12;
    const rng = seededRandom(roomSeed || 42);
    for (let py = 0; py < h; py += plankH) {
      const c = (Math.floor(py / plankH) % 2 === 0) ? c1 : c2;
      g.fillStyle(c, 1);
      g.fillRect(x, y + py, w, Math.min(plankH, h - py));
      // plank separation line
      g.fillStyle(0x000000, 0.08);
      g.fillRect(x, y + py + plankH - 1, w, 1);
      // Iter 1: wood highlight along top edge
      g.fillStyle(0xffffff, 0.15);
      g.fillRect(x, y + py, w, 1);
      // Iter 1: plank end lines (vertical joints)
      const numJoints = 2 + Math.floor(rng() * 3);
      for (let j = 0; j < numJoints; j++) {
        const jx = x + 30 + Math.floor(rng() * (w - 60));
        g.fillStyle(0x3a2208, 0.3);
        g.fillRect(jx, y + py, 1, Math.min(plankH, h - py));
      }
    }
    // Iter 1: knot details (3-4 per room)
    const numKnots = 3 + Math.floor(rng() * 2);
    for (let k = 0; k < numKnots; k++) {
      const kx = x + 10 + Math.floor(rng() * (w - 20));
      const ky = y + 10 + Math.floor(rng() * (h - 20));
      g.fillStyle(0x4a2e10, 0.4);
      g.fillEllipse(kx, ky, 2, 2);
    }
  }

  drawBookshelf(g, x, y, w, h) {
    g.fillStyle(PAL.bookshelf, 1);
    g.fillRect(x, y, w, h);
    const shelfH = 12;
    for (let sy = 0; sy < h; sy += shelfH) {
      g.fillStyle(PAL.wallDark, 1);
      g.fillRect(x, y + sy, w, 1);
      let bx = x + 2;
      while (bx < x + w - 8) {
        const bw = 4 + Math.floor(Math.random() * 4);
        const bh = 8 + Math.floor(Math.random() * 3);
        const bc = BOOK_COLORS[Math.floor(Math.random() * BOOK_COLORS.length)];
        g.fillStyle(bc, 1);
        g.fillRect(bx, y + sy + (shelfH - bh), bw, bh);
        bx += bw + 1;
      }
    }
  }

  drawBarrel(g, cx, cy, r) {
    r = r || 10;
    g.fillStyle(PAL.barrel, 1);
    g.fillCircle(cx, cy, r);
    g.lineStyle(1, PAL.barrelRing, 1);
    g.strokeCircle(cx, cy, r);
    g.strokeCircle(cx, cy, r * 0.6);
  }

  drawCrate(g, x, y, s) {
    s = s || 16;
    g.fillStyle(PAL.table, 1);
    g.fillRect(x, y, s, s);
    g.lineStyle(1, PAL.bookshelf, 1);
    g.strokeRect(x, y, s, s);
    g.lineBetween(x, y, x + s, y + s);
    g.lineBetween(x + s, y, x, y + s);
  }

  drawNPC(g, cx, cy, colors, stocky) {
    const w = stocky ? 10 : 8;
    const h = stocky ? 14 : 12;
    // Iter 4: shadow ellipse beneath NPC
    g.fillStyle(0x0a0605, 0.25);
    g.fillEllipse(cx, cy + h / 2 + 1, 6, 2);
    // body
    g.fillStyle(colors.shirt || colors.robe, 1);
    g.fillRect(cx - w / 2, cy - h / 2 + 3, w, h - 3);
    // apron overlay
    if (colors.apron) {
      g.fillStyle(colors.apron, 1);
      g.fillRect(cx - w / 2 + 1, cy - h / 2 + 5, w - 2, h - 6);
    }
    // head
    g.fillStyle(PAL.skin, 1);
    g.fillCircle(cx, cy - h / 2 + 2, 4);
    // hair
    g.fillStyle(colors.hair, 1);
    g.fillRect(cx - 3, cy - h / 2 - 2, 6, 3);
    return { x: cx, y: cy, ox: cx, oy: cy, w, h, timer: Math.random() * 4000, dx: 0, dy: 0 };
  }

  // Iter 2: wall-mounted sconce with radial floor glow
  drawWallSconce(x, y, radius, intensity, lit) {
    const gfx = this.add.graphics();
    // Bracket on wall
    gfx.fillStyle(0x5a4020, 1);
    gfx.fillRect(x - 3, y - 2, 6, 4);
    // Vertical arm
    gfx.fillStyle(0x4a3018, 1);
    gfx.fillRect(x - 1, y + 2, 2, 4);

    if (lit) {
      // Flame ellipse
      gfx.fillStyle(0xf0c040, 1);
      gfx.fillEllipse(x, y + 7, 3, 4);
      gfx.fillStyle(0xffe080, 0.8);
      gfx.fillEllipse(x, y + 6, 2, 2);

      // Radial floor glow — concentric ellipses
      const glow = this.add.graphics();
      const r = radius || 35;
      glow.fillStyle(PAL.lantern, 0.03);
      glow.fillEllipse(x, y + 10, r * 2, r * 1.4);
      glow.fillStyle(PAL.lantern, 0.06);
      glow.fillEllipse(x, y + 10, r * 1.4, r * 1.0);
      glow.fillStyle(PAL.lantern, 0.10);
      glow.fillEllipse(x, y + 10, r * 0.9, r * 0.6);
      glow.fillStyle(PAL.lantern, 0.15);
      glow.fillEllipse(x, y + 10, r * 0.5, r * 0.35);
      this.lanternGlows.push({ gfx: glow, baseAlpha: intensity || 0.6, phase: Math.random() * Math.PI * 2 });
    } else {
      // Unlit sconce
      gfx.fillStyle(0x2a1a0a, 0.6);
      gfx.fillEllipse(x, y + 7, 2, 3);
    }
  }

  // Iter 5: exterior cobblestone/earth around the inn
  drawExterior() {
    const g = this.add.graphics();
    const outerX = GRID_X - WALL_T - 8;
    const outerY = GRID_Y - WALL_T - 8;
    const outerW = 2 * ROOM_W + WALL_T + 2 * WALL_T + 16;
    const outerH = 2 * ROOM_H + WALL_T + 2 * WALL_T + 16;

    // Dark earth base
    g.fillStyle(0x1a1008, 1);
    g.fillRect(outerX, outerY, outerW, outerH);

    // Subtle tile/cobblestone lines
    const tileSize = 10;
    g.lineStyle(1, 0x221408, 0.5);
    for (let ty = outerY; ty < outerY + outerH; ty += tileSize) {
      g.lineBetween(outerX, ty, outerX + outerW, ty);
    }
    for (let tx = outerX; tx < outerX + outerW; tx += tileSize) {
      g.lineBetween(tx, outerY, tx, outerY + outerH);
    }
  }

  drawAllRooms() {
    const g = this.add.graphics();

    // ─── LIBRARY (top-left) ───
    const lib = roomPos(0, 0);
    this.drawFloorPlanks(g, lib.x, lib.y, ROOM_W, ROOM_H, PAL.floor1, PAL.floor2, 12, 101);
    // shadow corners
    g.fillStyle(PAL.shadow, 0.3);
    g.fillRect(lib.x, lib.y, 30, 20);
    g.fillRect(lib.x, lib.y + ROOM_H - 20, 30, 20);
    // North wall bookshelf
    this.drawBookshelf(g, lib.x + 8, lib.y + 4, ROOM_W - 16, 24);
    // West wall bookshelf
    this.drawBookshelf(g, lib.x + 4, lib.y + 30, 20, ROOM_H - 60);
    // Reading desk
    g.fillStyle(PAL.table, 1);
    g.fillRect(lib.x + 80, lib.y + 100, 50, 30);
    g.fillStyle(PAL.tableLeg, 1);
    g.fillRect(lib.x + 82, lib.y + 102, 3, 3);
    g.fillRect(lib.x + 125, lib.y + 102, 3, 3);
    g.fillRect(lib.x + 82, lib.y + 125, 3, 3);
    g.fillRect(lib.x + 125, lib.y + 125, 3, 3);
    // Paper on desk
    this.pageRect = { x: lib.x + 95, y: lib.y + 108, w: 14, h: 10 };
    const pageGfx = this.add.graphics();
    pageGfx.fillStyle(0xf0e8d0, 1);
    pageGfx.fillRect(this.pageRect.x, this.pageRect.y, this.pageRect.w, this.pageRect.h);
    this.pageGraphics = pageGfx;
    // Iter 2: wall sconce top-right corner
    this.drawWallSconce(lib.x + ROOM_W - 20, lib.y + 10, 40, 0.6, true);
    // Iter 4: Scholar NPC with book in hands
    const scholar = this.drawNPC(g, lib.x + 105, lib.y + 90, NPC_COLORS.scholar);
    // Tiny book in hands
    g.fillStyle(0xf0e8d0, 1);
    g.fillRect(lib.x + 108, lib.y + 92, 5, 4);
    g.fillStyle(0x8a2020, 1);
    g.fillRect(lib.x + 108, lib.y + 92, 5, 1);
    this.npcs.push({ ...scholar, bounds: { x: lib.x + 30, y: lib.y + 30, w: ROOM_W - 50, h: ROOM_H - 50 } });

    // ─── TAVERN (top-right) ───
    const tav = roomPos(1, 0);
    this.drawFloorPlanks(g, tav.x, tav.y, ROOM_W, ROOM_H, PAL.floorWarm1, PAL.floorWarm2, 12, 202);
    g.fillStyle(PAL.shadow, 0.25);
    g.fillRect(tav.x + ROOM_W - 30, tav.y, 30, 20);
    // Counter along north wall
    g.fillStyle(PAL.barrel, 1);
    g.fillRect(tav.x + 20, tav.y + 8, ROOM_W - 40, 18);
    g.fillStyle(PAL.wallDark, 1);
    g.fillRect(tav.x + 20, tav.y + 8, ROOM_W - 40, 2);
    // Barrels behind counter
    this.drawBarrel(g, tav.x + 40, tav.y + 18, 8);
    this.drawBarrel(g, tav.x + 60, tav.y + 16, 8);
    this.drawBarrel(g, tav.x + 80, tav.y + 18, 8);
    // Round tables with stools
    const tables = [
      { cx: tav.x + 60, cy: tav.y + 100 },
      { cx: tav.x + 140, cy: tav.y + 130 }
    ];
    tables.forEach(t => {
      g.fillStyle(PAL.table, 1);
      g.fillCircle(t.cx, t.cy, 14);
      g.lineStyle(1, PAL.tableLeg, 1);
      g.strokeCircle(t.cx, t.cy, 14);
      const offsets = [[-18, 0], [18, 0], [0, -18], [0, 18]];
      offsets.forEach(o => {
        g.fillStyle(PAL.bookshelf, 1);
        g.fillCircle(t.cx + o[0], t.cy + o[1], 4);
      });
    });
    // East wall shelves with bottles
    g.fillStyle(PAL.bookshelf, 1);
    g.fillRect(tav.x + ROOM_W - 22, tav.y + 40, 16, 80);
    for (let by = 0; by < 80; by += 14) {
      g.fillStyle(PAL.wallDark, 1);
      g.fillRect(tav.x + ROOM_W - 22, tav.y + 40 + by, 16, 1);
      for (let bx = 0; bx < 14; bx += 5) {
        g.fillStyle(0x3a6a4a, 0.8);
        g.fillRect(tav.x + ROOM_W - 20 + bx, tav.y + 40 + by + 3, 3, 9);
        g.fillStyle(0x2a5a3a, 1);
        g.fillRect(tav.x + ROOM_W - 20 + bx, tav.y + 40 + by + 2, 3, 2);
      }
    }
    // Iter 2: two sconces on east wall
    this.drawWallSconce(tav.x + ROOM_W - 12, tav.y + 50, 45, 0.5, true);
    this.drawWallSconce(tav.x + ROOM_W - 12, tav.y + 100, 40, 0.55, true);
    // Iter 4: Innkeeper NPC with mug
    const innkeeper = this.drawNPC(g, tav.x + 110, tav.y + 38, NPC_COLORS.innkeeper);
    // Mug in hand
    g.fillStyle(0x6a4a2a, 1);
    g.fillCircle(tav.x + 115, tav.y + 42, 2);
    g.fillStyle(0xd0b080, 0.8);
    g.fillCircle(tav.x + 115, tav.y + 41, 1);
    this.npcs.push({ ...innkeeper, bounds: { x: tav.x + 30, y: tav.y + 30, w: ROOM_W - 60, h: 30 } });
    // Iter 4: Patron NPC — seated posture (shorter, wider)
    const patron = this.drawNPC(g, tav.x + 60, tav.y + 85, NPC_COLORS.patron);
    // Seated width extension
    g.fillStyle(NPC_COLORS.patron.shirt, 1);
    g.fillRect(tav.x + 55, tav.y + 87, 10, 4);
    this.npcs.push({ ...patron, bounds: { x: tav.x + 30, y: tav.y + 50, w: ROOM_W - 60, h: ROOM_H - 80 } });

    // ─── STORAGE (bottom-left) ───
    const sto = roomPos(0, 1);
    this.drawFloorPlanks(g, sto.x, sto.y, ROOM_W, ROOM_H, PAL.floorDark1, PAL.floorDark2, 14, 303);
    g.fillStyle(PAL.shadow, 0.35);
    g.fillRect(sto.x, sto.y, ROOM_W, ROOM_H);
    g.fillStyle(PAL.shadow, 0.15);
    g.fillRect(sto.x, sto.y, ROOM_W, ROOM_H);
    // Iter 1: extra dark worn overlay for storage
    g.fillStyle(0x0a0605, 0.15);
    g.fillRect(sto.x, sto.y, ROOM_W, ROOM_H);
    // Barrels 3×2 grid
    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 3; c++) {
        this.drawBarrel(g, sto.x + 30 + c * 30, sto.y + 50 + r * 30, 11);
      }
    }
    // Crates stacked
    this.drawCrate(g, sto.x + 130, sto.y + 40, 18);
    this.drawCrate(g, sto.x + 150, sto.y + 38, 16);
    this.drawCrate(g, sto.x + 138, sto.y + 58, 14);
    // Pots near walls
    g.fillStyle(0x6a4a30, 1);
    g.fillCircle(sto.x + 20, sto.y + ROOM_H - 30, 7);
    g.fillCircle(sto.x + 38, sto.y + ROOM_H - 25, 6);
    g.fillStyle(0x5a3a20, 1);
    g.fillCircle(sto.x + ROOM_W - 25, sto.y + ROOM_H - 35, 8);
    // Iter 2: dim sconce, smaller glow
    this.drawWallSconce(sto.x + ROOM_W - 25, sto.y + 10, 22, 0.35, true);
    // Iter 4: Worker NPC — slightly hunched (y+1), with small crate nearby
    const worker = this.drawNPC(g, sto.x + 100, sto.y + 141, NPC_COLORS.worker);
    // Small crate near worker
    this.drawCrate(g, sto.x + 112, sto.y + 145, 10);
    this.npcs.push({ ...worker, bounds: { x: sto.x + 20, y: sto.y + 20, w: ROOM_W - 40, h: ROOM_H - 40 } });

    // ─── WORKSHOP (bottom-right) ───
    const wrk = roomPos(1, 1);
    this.drawFloorPlanks(g, wrk.x, wrk.y, ROOM_W, ROOM_H, PAL.floorStone1, PAL.floorStone2, 14, 404);
    // Forge/anvil
    g.fillStyle(0x2a2a2a, 1);
    g.fillRect(wrk.x + 70, wrk.y + 60, 40, 30);
    g.fillStyle(0x1a1a1a, 1);
    g.fillRect(wrk.x + 75, wrk.y + 65, 30, 20);
    // Anvil top
    g.fillStyle(0x4a4a4a, 1);
    g.fillRect(wrk.x + 78, wrk.y + 55, 24, 10);
    // Forge glow
    const forgeGlow = this.add.graphics();
    forgeGlow.fillStyle(PAL.forgeGlow, 0.2);
    forgeGlow.fillCircle(wrk.x + 90, wrk.y + 75, 50);
    forgeGlow.fillStyle(PAL.forgeGlow, 0.35);
    forgeGlow.fillCircle(wrk.x + 90, wrk.y + 70, 25);
    forgeGlow.fillStyle(0xff6030, 0.5);
    forgeGlow.fillCircle(wrk.x + 90, wrk.y + 65, 10);
    this.forgeGlows.push(forgeGlow);
    // Tool wall (north)
    g.fillStyle(PAL.wallInner, 1);
    g.fillRect(wrk.x + 20, wrk.y + 6, ROOM_W - 40, 18);
    // Hanging tools
    g.lineStyle(2, 0x6a6a6a, 1);
    g.lineBetween(wrk.x + 40, wrk.y + 10, wrk.x + 40, wrk.y + 22);
    g.fillStyle(0x5a5a5a, 1);
    g.fillRect(wrk.x + 35, wrk.y + 9, 10, 5);
    g.lineBetween(wrk.x + 70, wrk.y + 10, wrk.x + 68, wrk.y + 22);
    g.lineBetween(wrk.x + 74, wrk.y + 10, wrk.x + 76, wrk.y + 22);
    g.lineBetween(wrk.x + 100, wrk.y + 10, wrk.x + 100, wrk.y + 22);
    g.fillStyle(0x5a5a5a, 1);
    g.fillRect(wrk.x + 96, wrk.y + 8, 8, 5);
    g.lineStyle(2, 0x6a6a6a, 1);
    g.lineBetween(wrk.x + 130, wrk.y + 10, wrk.x + 150, wrk.y + 10);
    g.lineBetween(wrk.x + 130, wrk.y + 10, wrk.x + 130, wrk.y + 20);
    // Workbench along south
    g.fillStyle(PAL.table, 1);
    g.fillRect(wrk.x + 15, wrk.y + ROOM_H - 40, ROOM_W - 30, 24);
    g.fillStyle(PAL.tableLeg, 1);
    g.fillRect(wrk.x + 17, wrk.y + ROOM_H - 18, 4, 4);
    g.fillRect(wrk.x + ROOM_W - 21, wrk.y + ROOM_H - 18, 4, 4);
    // Scattered items on workbench
    g.fillStyle(0x8a8a8a, 1);
    g.fillRect(wrk.x + 30, wrk.y + ROOM_H - 36, 8, 4);
    g.fillRect(wrk.x + 60, wrk.y + ROOM_H - 38, 5, 6);
    g.fillStyle(0xaa6a2a, 1);
    g.fillRect(wrk.x + 90, wrk.y + ROOM_H - 36, 12, 5);
    g.fillRect(wrk.x + 120, wrk.y + ROOM_H - 37, 6, 4);
    // Iter 2: unlit sconce in workshop (forge dominates)
    this.drawWallSconce(wrk.x + 20, wrk.y + 90, 35, 0.4, false);
    // Iter 4: Blacksmith NPC — wider/stockier with dark apron overlay
    const smith = this.drawNPC(g, wrk.x + 90, wrk.y + 100, NPC_COLORS.smith, true);
    // Dark apron on front
    g.fillStyle(0x1a1208, 0.7);
    g.fillRect(wrk.x + 86, wrk.y + 97, 8, 8);
    this.npcs.push({ ...smith, bounds: { x: wrk.x + 40, y: wrk.y + 40, w: 80, h: 80 } });

    this.mainGfx = g;
  }

  // Iter 3: room atmosphere effects
  drawAtmosphere() {
    const lib = roomPos(0, 0);
    const tav = roomPos(1, 0);
    const sto = roomPos(0, 1);
    const wrk = roomPos(1, 1);

    // Library: dust motes (animated in startAnimations)
    for (let i = 0; i < 8; i++) {
      const mote = this.add.graphics();
      const mx = lib.x + 30 + Math.random() * (ROOM_W - 60);
      const my = lib.y + 30 + Math.random() * (ROOM_H - 60);
      mote.fillStyle(0xffffff, 0.3);
      mote.fillRect(0, 0, 1, 1);
      mote.setPosition(mx, my);
      this.dustMotes.push({
        gfx: mote,
        startX: mx,
        startY: my,
        delay: i * 750,
        roomY: lib.y,
        roomH: ROOM_H
      });
    }

    // Tavern: warm haze overlay
    const tavHaze = this.add.graphics();
    tavHaze.fillStyle(0xf0a030, 0.04);
    tavHaze.fillRect(tav.x, tav.y, ROOM_W, ROOM_H);

    // Storage: cobwebs in top corners
    const cobG = this.add.graphics();
    cobG.lineStyle(1, 0x6a5a40, 0.5);
    // Top-left corner cobweb
    cobG.lineBetween(sto.x + 2, sto.y + 2, sto.x + 20, sto.y + 12);
    cobG.lineBetween(sto.x + 2, sto.y + 2, sto.x + 15, sto.y + 18);
    cobG.lineBetween(sto.x + 2, sto.y + 2, sto.x + 10, sto.y + 22);
    cobG.lineBetween(sto.x + 20, sto.y + 12, sto.x + 15, sto.y + 18);
    // Top-right corner cobweb
    cobG.lineBetween(sto.x + ROOM_W - 2, sto.y + 2, sto.x + ROOM_W - 20, sto.y + 14);
    cobG.lineBetween(sto.x + ROOM_W - 2, sto.y + 2, sto.x + ROOM_W - 16, sto.y + 20);
    cobG.lineBetween(sto.x + ROOM_W - 2, sto.y + 2, sto.x + ROOM_W - 10, sto.y + 18);
    cobG.lineBetween(sto.x + ROOM_W - 20, sto.y + 14, sto.x + ROOM_W - 16, sto.y + 20);

    // Workshop: ember glow on floor near forge (animated)
    this.emberGlow = this.add.graphics();
    this.emberGlowPos = { x: wrk.x + 90, y: wrk.y + 95 };
    this.redrawEmberGlow(0.15);
  }

  redrawEmberGlow(alpha) {
    this.emberGlow.clear();
    const pos = this.emberGlowPos;
    this.emberGlow.fillStyle(0xe04010, alpha);
    this.emberGlow.fillEllipse(pos.x, pos.y, 30, 18);
    this.emberGlow.fillStyle(0xff6020, alpha * 0.6);
    this.emberGlow.fillEllipse(pos.x, pos.y, 16, 10);
  }

  // Iter 5: moonlight, vignette, wall gradient
  drawCompositionPolish() {
    const g = this.add.graphics();
    const outerX = GRID_X - WALL_T;
    const outerY = GRID_Y - WALL_T;
    const outerW = 2 * ROOM_W + WALL_T + 2 * WALL_T;

    // Moonlight edge along top outer wall
    g.fillStyle(0x8090b0, 0.3);
    g.fillRect(outerX, outerY - 2, outerW, 2);

    // Cool→warm gradient on outer wall top face
    g.fillStyle(0x6080a0, 0.08);
    g.fillRect(outerX, outerY - WALL_T / 2, outerW, WALL_T / 2);

    // Vignette: dark rects in room corners for volumetric lighting feel
    const rooms = [roomPos(0, 0), roomPos(1, 0), roomPos(0, 1), roomPos(1, 1)];
    rooms.forEach(r => {
      g.fillStyle(0x0a0605, 0.12);
      g.fillRect(r.x, r.y, 25, 20);
      g.fillStyle(0x0a0605, 0.12);
      g.fillRect(r.x + ROOM_W - 25, r.y + ROOM_H - 20, 25, 20);
    });
  }

  drawWallsAndDoors() {
    const g = this.add.graphics();

    const rooms = [
      roomPos(0, 0), roomPos(1, 0),
      roomPos(0, 1), roomPos(1, 1)
    ];

    rooms.forEach((r, i) => {
      g.lineStyle(WALL_T, PAL.wall, 1);
      g.strokeRect(r.x - WALL_T / 2, r.y - WALL_T / 2, ROOM_W + WALL_T, ROOM_H + WALL_T);
    });

    // Doorway: Library ↔ Tavern
    const doorLT = {
      x: rooms[0].x + ROOM_W,
      y: rooms[0].y + (ROOM_H - DOOR_W) / 2
    };
    this.drawDoorway(g, doorLT.x - WALL_T / 2 - 2, doorLT.y, WALL_T + 4, DOOR_W, 'vertical');

    // Doorway: Storage ↔ Workshop
    const doorSW = {
      x: rooms[2].x + ROOM_W,
      y: rooms[2].y + (ROOM_H - DOOR_W) / 2
    };
    this.drawDoorway(g, doorSW.x - WALL_T / 2 - 2, doorSW.y, WALL_T + 4, DOOR_W, 'vertical');

    // Doorway: Library ↔ Storage
    const doorLS = {
      x: rooms[0].x + (ROOM_W - DOOR_W) / 2,
      y: rooms[0].y + ROOM_H
    };
    this.drawDoorway(g, doorLS.x, doorLS.y - WALL_T / 2 - 2, DOOR_W, WALL_T + 4, 'horizontal');

    // Doorway: Tavern ↔ Workshop
    const doorTW = {
      x: rooms[1].x + (ROOM_W - DOOR_W) / 2,
      y: rooms[1].y + ROOM_H
    };
    this.drawDoorway(g, doorTW.x, doorTW.y - WALL_T / 2 - 2, DOOR_W, WALL_T + 4, 'horizontal');
  }

  drawDoorway(g, x, y, w, h, orientation) {
    g.fillStyle(PAL.floor1, 1);
    g.fillRect(x, y, w, h);

    const chamfer = 6;
    g.lineStyle(2, PAL.wallInner, 1);

    if (orientation === 'vertical') {
      g.lineBetween(x, y + chamfer, x, y + h - chamfer);
      g.lineBetween(x, y + chamfer, x + chamfer, y);
      g.lineBetween(x, y + h - chamfer, x + chamfer, y + h);
      g.lineBetween(x + w, y + chamfer, x + w, y + h - chamfer);
      g.lineBetween(x + w, y + chamfer, x + w - chamfer, y);
      g.lineBetween(x + w, y + h - chamfer, x + w - chamfer, y + h);
    } else {
      g.lineBetween(x + chamfer, y, x + w - chamfer, y);
      g.lineBetween(x + chamfer, y, x, y + chamfer);
      g.lineBetween(x + w - chamfer, y, x + w, y + chamfer);
      g.lineBetween(x + chamfer, y + h, x + w - chamfer, y + h);
      g.lineBetween(x + chamfer, y + h, x, y + h - chamfer);
      g.lineBetween(x + w - chamfer, y + h, x + w, y + h - chamfer);
    }

    g.fillStyle(PAL.floor3, 0.6);
    g.fillRect(x + 2, y + 2, w - 4, h - 4);
  }

  drawHUD() {
    const g = this.add.graphics();
    g.fillStyle(PAL.hudBg, 0.5);
    g.fillRect(0, 0, W, 30);
    g.fillStyle(PAL.wall, 0.6);
    g.fillRect(0, 29, W, 1);
    // Iter 5: subtle amber bottom border
    g.fillStyle(0xf0a030, 0.25);
    g.fillRect(0, 30, W, 1);

    this.add.text(12, 7, '🏠 Takamachi Inn — Year 1, Autumn', {
      fontFamily: 'monospace',
      fontSize: '12px',
      color: '#e0d0b0'
    });

    this.add.text(W - 80, 7, '💰 1,240G', {
      fontFamily: 'monospace',
      fontSize: '12px',
      color: '#f0a030'
    });
  }

  startAnimations() {
    // Lantern pulse
    this.time.addEvent({
      delay: 50,
      loop: true,
      callback: () => {
        const t = this.time.now;
        this.lanternGlows.forEach((lg, i) => {
          const phase = lg.phase + t * 0.002;
          const alpha = lg.baseAlpha + Math.sin(phase) * 0.2;
          lg.gfx.setAlpha(Math.max(0.1, Math.min(1, alpha)));
        });
      }
    });

    // Forge flicker
    this.time.addEvent({
      delay: 80,
      loop: true,
      callback: () => {
        this.forgeGlows.forEach(fg => {
          const flicker = 0.3 + Math.random() * 0.5;
          fg.setAlpha(flicker);
        });
      }
    });

    // Page reading animation
    this.time.addEvent({
      delay: 100,
      loop: true,
      callback: () => {
        if (this.pageGraphics) {
          const pulse = 0.5 + Math.sin(this.time.now * 0.001) * 0.4;
          this.pageGraphics.setAlpha(pulse);
        }
      }
    });

    // Iter 3: dust mote animation (library) — 6s cycle, drifting upward
    this.time.addEvent({
      delay: 100,
      loop: true,
      callback: () => {
        const t = this.time.now;
        this.dustMotes.forEach(m => {
          const cycle = 6000;
          const elapsed = (t + m.delay) % cycle;
          const progress = elapsed / cycle;
          const dy = -progress * 40;
          const dx = Math.sin(progress * Math.PI * 2) * 5;
          const alpha = 0.3 * (1 - progress);
          m.gfx.setPosition(m.startX + dx, m.startY + dy);
          m.gfx.setAlpha(alpha);
        });
      }
    });

    // Iter 3: ember glow pulse (workshop) — 600ms cycle
    this.time.addEvent({
      delay: 50,
      loop: true,
      callback: () => {
        const t = this.time.now;
        const cycle = 600;
        const progress = (t % cycle) / cycle;
        const alpha = 0.1 + 0.15 * Math.sin(progress * Math.PI * 2) * 0.5 + 0.075;
        this.redrawEmberGlow(alpha);
      }
    });

    // NPC idle drift
    this.npcGfx = this.add.graphics();
    this.time.addEvent({
      delay: 100,
      loop: true,
      callback: () => {
        const t = this.time.now;
        this.npcGfx.clear();
        this.npcs.forEach((npc, i) => {
          npc.timer -= 100;
          if (npc.timer <= 0) {
            npc.dx = (Math.random() - 0.5) * 0.3;
            npc.dy = (Math.random() - 0.5) * 0.3;
            npc.timer = 3000 + Math.random() * 2000;
          }
          npc.x += npc.dx;
          npc.y += npc.dy;
          const b = npc.bounds;
          if (b) {
            npc.x = Math.max(b.x, Math.min(b.x + b.w, npc.x));
            npc.y = Math.max(b.y, Math.min(b.y + b.h, npc.y));
          }
          this.drawNPCAt(this.npcGfx, npc);
        });
      }
    });
  }

  // ── SSE connection ──
  connectSSE() {
    // Agent → room mapping
    this.agentRoomMap = {
      forge: 'workshop', iron: 'storage',
      sage: 'library', lumen: 'library',
      scarlet: 'tavern', mosaic: 'tavern', canvas: 'tavern', muse: 'tavern',
      echo: 'tavern', cronos: 'tavern',
      patch: 'library', qa: 'library', kenzo: 'library', planner: 'library',
    };

    // Room → lantern glow references (index into this.lanternGlows)
    // Library sconce = index 0, Tavern sconces = 1,2, Storage = 3
    this.roomLanterns = {
      library: [0],
      tavern: [1, 2],
      storage: [3],
      workshop: [], // forge glow handles this
    };

    // Room → NPC index mapping (approximate — first NPC per room)
    this.roomNpcIndex = {
      library: 0,   // scholar
      tavern: 1,    // innkeeper (or patron=2)
      storage: 3,   // worker
      workshop: 4,  // smith
    };

    // Live indicator (bottom-right)
    this.liveDot = this.add.graphics();
    this.liveText = this.add.text(W - 38, H - 18, 'live', {
      fontFamily: 'monospace', fontSize: '9px', color: '#ffffff'
    }).setAlpha(0.7);
    this.sseConnected = false;
    this.drawLiveDot();

    // Pulse the dot
    this.time.addEvent({ delay: 800, loop: true, callback: () => {
      if (this.sseConnected) {
        this.liveDot.setAlpha(this.liveDot.alpha > 0.5 ? 0.4 : 1);
      }
    }});

    // Last spoke ticker
    this.lastSpokeText = this.add.text(140, 12, '', {
      fontFamily: 'monospace', fontSize: '10px', color: '#a09080'
    });

    this.startSSE();
  }

  drawLiveDot() {
    this.liveDot.clear();
    const color = this.sseConnected ? 0x40e040 : 0x808080;
    this.liveDot.fillStyle(color, 1);
    this.liveDot.fillCircle(W - 48, H - 14, 4);
  }

  startSSE() {
    try {
      const es = new EventSource('https://api.kurokimachi.com/events');
      es.onopen = () => {
        this.sseConnected = true;
        this.drawLiveDot();
      };
      es.onerror = () => {
        this.sseConnected = false;
        this.drawLiveDot();
        es.close();
        this.time.delayedCall(3000, () => this.startSSE());
      };
      es.onmessage = (e) => this.handleSSE(e);
      es.addEventListener('message', (e) => this.handleSSE(e));
      es.addEventListener('state:sync', (e) => this.handleSSE(e));
      es.addEventListener('agent:speak', (e) => this.handleSSE(e));
      es.addEventListener('agent:online', (e) => this.handleSSE(e));
      es.addEventListener('agent:offline', (e) => this.handleSSE(e));
    } catch (err) {
      this.time.delayedCall(3000, () => this.startSSE());
    }
  }

  handleSSE(e) {
    try {
      const data = JSON.parse(e.data);
      const type = data.type || data.event;
      const agentId = data.agentId || (data.meta && data.meta.agentId);
      const message = data.content || (data.meta && data.meta.message) || '';

      if (type === 'agent:speak' && agentId) {
        this.onAgentSpeak(agentId, message);
      }
      if (type === 'agent:online' && agentId) {
        this.onAgentOnline(agentId);
      }
      if (type === 'agent:offline' && agentId) {
        this.onAgentOffline(agentId);
      }

      // Check gazette inside state:sync
      if (data.gazette && Array.isArray(data.gazette)) {
        data.gazette.forEach(item => {
          const iType = item.type || item.event;
          const iAgent = item.agentId || (item.meta && item.meta.agentId);
          const iMsg = item.content || (item.meta && item.meta.message) || '';
          if (iType === 'agent:speak' && iAgent) this.onAgentSpeak(iAgent, iMsg);
          if (iType === 'agent:online' && iAgent) this.onAgentOnline(iAgent);
          if (iType === 'agent:offline' && iAgent) this.onAgentOffline(iAgent);
        });
      }
    } catch (err) { /* ignore parse errors */ }
  }

  getRoomForAgent(agentId) {
    return this.agentRoomMap[agentId] || 'library';
  }

  onAgentSpeak(agentId, message) {
    const room = this.getRoomForAgent(agentId);
    const npcIdx = this.roomNpcIndex[room];

    // 1. NPC bounce
    if (npcIdx !== undefined && this.npcs[npcIdx]) {
      const npc = this.npcs[npcIdx];
      const origY = npc.y;
      this.tweens.add({
        targets: npc,
        y: origY - 4,
        duration: 100,
        yoyo: true,
        ease: 'Sine.easeOut'
      });
    }

    // 2. Lantern flare
    const lanternIndices = this.roomLanterns[room] || [];
    lanternIndices.forEach(idx => {
      if (this.lanternGlows[idx]) {
        const lg = this.lanternGlows[idx];
        const origAlpha = lg.baseAlpha;
        lg.gfx.setAlpha(1);
        this.time.delayedCall(800, () => {
          lg.gfx.setAlpha(origAlpha);
        });
      }
    });

    // For workshop, flare forge glow
    if (room === 'workshop' && this.forgeGlows[0]) {
      this.forgeGlows[0].setAlpha(1);
      this.time.delayedCall(800, () => {
        this.forgeGlows[0].setAlpha(0.4);
      });
    }

    // 3. Speech bubble above NPC
    if (npcIdx !== undefined && this.npcs[npcIdx]) {
      const npc = this.npcs[npcIdx];
      this.showSpeechBubble(npc.x, npc.y - 16);
    }

    // 4. Update ticker
    const truncMsg = message.length > 30 ? message.substring(0, 30) + '…' : message;
    this.lastSpokeText.setText(`last: ${agentId} — ${truncMsg}`);
  }

  onAgentOnline(agentId) {
    const room = this.getRoomForAgent(agentId);
    const lanternIndices = this.roomLanterns[room] || [];
    lanternIndices.forEach(idx => {
      if (this.lanternGlows[idx]) {
        const lg = this.lanternGlows[idx];
        this.tweens.add({
          targets: lg.gfx,
          alpha: { from: 0.3, to: 1 },
          duration: 500,
          ease: 'Sine.easeIn'
        });
      }
    });
    if (room === 'workshop' && this.forgeGlows[0]) {
      this.tweens.add({
        targets: this.forgeGlows[0],
        alpha: { from: 0.3, to: 1 },
        duration: 500
      });
    }
  }

  onAgentOffline(agentId) {
    const room = this.getRoomForAgent(agentId);
    const lanternIndices = this.roomLanterns[room] || [];
    lanternIndices.forEach(idx => {
      if (this.lanternGlows[idx]) {
        const lg = this.lanternGlows[idx];
        this.tweens.add({
          targets: lg.gfx,
          alpha: { from: 1, to: 0.4 },
          duration: 800,
          ease: 'Sine.easeOut'
        });
      }
    });
    if (room === 'workshop' && this.forgeGlows[0]) {
      this.tweens.add({
        targets: this.forgeGlows[0],
        alpha: { from: 1, to: 0.4 },
        duration: 800
      });
    }
  }

  showSpeechBubble(x, y) {
    const bubble = this.add.graphics();
    // Rounded rect background
    bubble.fillStyle(0xffffff, 0.9);
    bubble.fillRoundedRect(x - 10, y - 6, 20, 12, 3);
    // Three dots
    bubble.fillStyle(0x555555, 1);
    bubble.fillCircle(x - 4, y, 1.5);
    bubble.fillCircle(x, y, 1.5);
    bubble.fillCircle(x + 4, y, 1.5);
    // Small triangle pointer
    bubble.fillStyle(0xffffff, 0.9);
    bubble.beginPath();
    bubble.moveTo(x - 2, y + 6);
    bubble.lineTo(x + 2, y + 6);
    bubble.lineTo(x, y + 9);
    bubble.closePath();
    bubble.fillPath();

    bubble.setAlpha(1);
    this.time.delayedCall(2500, () => {
      this.tweens.add({
        targets: bubble,
        alpha: 0,
        duration: 300,
        onComplete: () => bubble.destroy()
      });
    });
  }

  drawNPCAt(g, npc) {
    const cx = npc.x, cy = npc.y;
    const w = npc.w, h = npc.h;
    // Iter 4: shadow ellipse
    g.fillStyle(0x0a0605, 0.25);
    g.fillEllipse(cx, cy + h / 2 + 1, 6, 2);
    // body
    const origColors = this.getNPCOrigColors(npc);
    g.fillStyle(origColors.body, 1);
    g.fillRect(cx - w / 2, cy - h / 2 + 3, w, h - 3);
    if (origColors.apron) {
      g.fillStyle(origColors.apron, 1);
      g.fillRect(cx - w / 2 + 1, cy - h / 2 + 5, w - 2, h - 6);
    }
    // head
    g.fillStyle(PAL.skin, 1);
    g.fillCircle(cx, cy - h / 2 + 2, 4);
    // hair
    g.fillStyle(origColors.hair, 1);
    g.fillRect(cx - 3, cy - h / 2 - 2, 6, 3);
  }

  getNPCOrigColors(npc) {
    const idx = this.npcs.indexOf(npc);
    const colorSets = [
      { body: NPC_COLORS.scholar.robe, hair: NPC_COLORS.scholar.hair },
      { body: NPC_COLORS.innkeeper.shirt, hair: NPC_COLORS.innkeeper.hair, apron: NPC_COLORS.innkeeper.apron },
      { body: NPC_COLORS.patron.shirt, hair: NPC_COLORS.patron.hair },
      { body: NPC_COLORS.worker.shirt, hair: NPC_COLORS.worker.hair },
      { body: NPC_COLORS.smith.shirt, hair: NPC_COLORS.smith.hair },
    ];
    return colorSets[idx] || colorSets[0];
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0d0a07',
  scene: TakamachiScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    max: { width: W, height: H }
  }
});
</script>
