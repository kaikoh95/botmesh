<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高町旅館 · Takamachi Inn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0a07; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const W = 600, H = 700;
const WALL_T = 10;
const DOOR_W = 40;
const ROOM_W = 200, ROOM_H = 220;
const GRID_X = 90, GRID_Y = 60;
const GAP = WALL_T;

const PAL = {
  bg: 0x0d0a07,
  wall: 0x3a2010,
  wallDark: 0x2a1808,
  wallInner: 0x4a2e18,
  floor1: 0x7a4e28,
  floor2: 0x8b5e30,
  floor3: 0x6b3e20,
  floorWarm1: 0x8b5e30,
  floorWarm2: 0x9a6e3a,
  floorDark1: 0x5c3818,
  floorDark2: 0x6b4520,
  floorStone1: 0x4a3828,
  floorStone2: 0x5a4838,
  shadow: 0x1a0e04,
  lantern: 0xf0a030,
  bookshelf: 0x5c3a18,
  barrel: 0x6b4226,
  barrelRing: 0x3a2a10,
  table: 0x8b6030,
  tableLeg: 0x5c3a18,
  skin: 0xe8b878,
  forgeGlow: 0xe05020,
  hudBg: 0x0d0a07,
};

const BOOK_COLORS = [0x4a6a8a, 0x8a2020, 0x2a6a3a, 0x7a5a18, 0x6a3a6a, 0x3a5a7a, 0x9a5a2a, 0x5a2a4a];
const NPC_COLORS = {
  scholar: { robe: 0x2a2040, hair: 0x3a2010 },
  innkeeper: { shirt: 0x8a4020, apron: 0xd0c0a0, hair: 0x1a1010 },
  patron: { shirt: 0x4a6a3a, hair: 0x6a3a10 },
  worker: { shirt: 0x5a4a3a, hair: 0x2a1808 },
  smith: { shirt: 0x3a3a3a, hair: 0x1a0e04 },
};

function roomPos(col, row) {
  return {
    x: GRID_X + col * (ROOM_W + WALL_T),
    y: GRID_Y + row * (ROOM_H + WALL_T)
  };
}

class TakamachiScene extends Phaser.Scene {
  constructor() { super('TakamachiScene'); }

  create() {
    this.lanternGlows = [];
    this.ambientGlows = [];
    this.forgeGlows = [];
    this.npcs = [];
    this.dustMotes = [];
    this.pageRect = null;

    this.drawAllRooms();
    this.drawWallsAndDoors();
    this.drawVignette();
    this.drawHUD();
    this.startAnimations();
  }

  // ── Iteration 2: floor planks with texture lines & aging ──
  drawFloorPlanks(g, x, y, w, h, c1, c2, plankH) {
    plankH = plankH || 12;
    for (let py = 0; py < h; py += plankH) {
      const row = Math.floor(py / plankH);
      const c = (row % 2 === 0) ? c1 : c2;
      const alpha = (row % 3 === 0) ? 0.92 : 1;
      g.fillStyle(c, alpha);
      g.fillRect(x, y + py, w, Math.min(plankH, h - py));
      // thin dark separation line between plank rows
      g.fillStyle(0x000000, 0.19);
      g.fillRect(x, y + py + plankH - 1, w, 1);
    }
  }

  // ── Iteration 2: rugs ──
  drawRug(g, x, y, w, h, color) {
    g.fillStyle(color, 0.85);
    g.fillRect(x, y, w, h);
    // lighter border
    const bdr = (color === 0x8a1818) ? 0xba3838 : 0x3858ba;
    g.lineStyle(1, bdr, 0.7);
    g.strokeRect(x + 1, y + 1, w - 2, h - 2);
  }

  // ── Iteration 2: storage dirt dots ──
  drawDirtDots(g, x, y, w, h) {
    for (let i = 0; i < 18; i++) {
      const dx = x + 10 + Math.random() * (w - 20);
      const dy = y + 10 + Math.random() * (h - 20);
      g.fillStyle(0x3a2808, 0.4);
      g.fillCircle(dx, dy, 1 + Math.random());
    }
  }

  // ── Iteration 2: workshop scorch marks & metal shavings ──
  drawScorchAndShavings(g, forgeX, forgeY, anvilX, anvilY) {
    // scorch marks near forge
    g.fillStyle(0x1a0a04, 0.6);
    g.fillEllipse(forgeX, forgeY + 20, 30, 10);
    g.fillEllipse(forgeX - 12, forgeY + 14, 16, 8);
    g.fillEllipse(forgeX + 15, forgeY + 18, 20, 7);
    // metal shavings near anvil
    for (let i = 0; i < 10; i++) {
      g.fillStyle(0x8a8a9a, 0.5);
      g.fillCircle(anvilX + (Math.random() - 0.5) * 30, anvilY + (Math.random() - 0.5) * 20, 0.8);
    }
  }

  drawBookshelf(g, x, y, w, h) {
    g.fillStyle(PAL.bookshelf, 1);
    g.fillRect(x, y, w, h);
    const shelfH = 12;
    for (let sy = 0; sy < h; sy += shelfH) {
      g.fillStyle(PAL.wallDark, 1);
      g.fillRect(x, y + sy, w, 1);
      let bx = x + 2;
      while (bx < x + w - 8) {
        const bw = 4 + Math.floor(Math.random() * 4);
        const bh = 8 + Math.floor(Math.random() * 3);
        const bc = BOOK_COLORS[Math.floor(Math.random() * BOOK_COLORS.length)];
        g.fillStyle(bc, 1);
        g.fillRect(bx, y + sy + (shelfH - bh), bw, bh);
        bx += bw + 1;
      }
    }
  }

  drawBarrel(g, cx, cy, r) {
    r = r || 10;
    g.fillStyle(PAL.barrel, 1);
    g.fillCircle(cx, cy, r);
    g.lineStyle(1, PAL.barrelRing, 1);
    g.strokeCircle(cx, cy, r);
    g.strokeCircle(cx, cy, r * 0.6);
  }

  drawCrate(g, x, y, s) {
    s = s || 16;
    g.fillStyle(PAL.table, 1);
    g.fillRect(x, y, s, s);
    g.lineStyle(1, PAL.bookshelf, 1);
    g.strokeRect(x, y, s, s);
    g.lineBetween(x, y, x + s, y + s);
    g.lineBetween(x + s, y, x, y + s);
  }

  // ── Iteration 3: enhanced NPC drawing with feet, shadow, props ──
  drawNPC(g, cx, cy, colors, type) {
    const stocky = (type === 'smith');
    const seated = (type === 'patron');
    const hunched = (type === 'worker');
    const w = stocky ? 12 : 8;
    const h = stocky ? 14 : (seated ? 10 : 12);

    // shadow under feet
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(cx, cy + h / 2 + 2, w + 4, 5);

    // body
    if (hunched) {
      // tilted body for worker — draw as parallelogram approximation
      g.fillStyle(colors.shirt || colors.robe, 1);
      g.fillRect(cx - w / 2 - 1, cy - h / 2 + 3, w, h - 3);
    } else {
      g.fillStyle(colors.shirt || colors.robe, 1);
      g.fillRect(cx - w / 2, cy - h / 2 + 3, w, h - 3);
    }

    // apron overlay (innkeeper white stripe)
    if (colors.apron) {
      g.fillStyle(colors.apron, 1);
      g.fillRect(cx - w / 2 + 1, cy - h / 2 + 5, w - 2, h - 6);
    }
    // smith leather apron
    if (type === 'smith') {
      g.fillStyle(0x6a3020, 1);
      g.fillRect(cx - w / 2 + 1, cy - h / 2 + 6, w - 2, h - 7);
    }
    // innkeeper brown pants
    if (type === 'innkeeper') {
      g.fillStyle(0x5a3a18, 1);
      g.fillRect(cx - w / 2, cy + 2, w, 5);
    }

    // feet dots
    g.fillStyle(0x3a2010, 1);
    g.fillCircle(cx - 2, cy + h / 2 + 1, 1.5);
    g.fillCircle(cx + 2, cy + h / 2 + 1, 1.5);

    // head
    g.fillStyle(PAL.skin, 1);
    g.fillCircle(cx, cy - h / 2 + 2, 4);
    if (type === 'scholar') {
      // white head (bald/white-haired)
      g.fillStyle(0xd0d0d0, 1);
      g.fillRect(cx - 3, cy - h / 2 - 2, 6, 3);
    } else {
      // hair
      g.fillStyle(colors.hair, 1);
      g.fillRect(cx - 3, cy - h / 2 - 2, 6, 3);
    }

    // scholar holds open book
    if (type === 'scholar') {
      g.fillStyle(0xf0e8d0, 1);
      g.fillRect(cx - 6, cy, 12, 4);
      g.fillStyle(0x000000, 0.3);
      g.fillRect(cx, cy, 1, 4);
    }
    // patron seated — already smaller h
    // worker hunched posture marker
    if (hunched) {
      g.fillStyle(colors.shirt, 0.5);
      g.fillRect(cx - w / 2 + w, cy - h / 2 + 5, 2, 4);
    }

    return { x: cx, y: cy, ox: cx, oy: cy, w, h, timer: Math.random() * 4000, dx: 0, dy: 0, type: type || 'generic' };
  }

  drawLanternGlow(x, y, r, intensity) {
    const gfx = this.add.graphics();
    gfx.fillStyle(PAL.lantern, 1);
    gfx.fillCircle(x, y, 3);
    const glow = this.add.graphics();
    glow.fillStyle(PAL.lantern, 0.15);
    glow.fillCircle(x, y, r || 40);
    glow.fillStyle(PAL.lantern, 0.08);
    glow.fillCircle(x, y, (r || 40) * 1.5);
    this.lanternGlows.push({ gfx: glow, baseAlpha: intensity || 0.6, phase: Math.random() * Math.PI * 2 });
    return glow;
  }

  // ── Iteration 1: ambient light pools per room ──
  drawAmbientGlow(x, y, radius, alpha, color) {
    const glow = this.add.graphics();
    glow.fillStyle(color, alpha);
    glow.fillCircle(x, y, radius);
    glow.fillStyle(color, alpha * 0.5);
    glow.fillCircle(x, y, radius * 1.4);
    this.ambientGlows.push({ gfx: glow, baseAlpha: 1.0, phase: Math.random() * Math.PI * 2 });
    return glow;
  }

  // ── Iteration 5: wall corner shadows ──
  drawCornerShadows(g, rx, ry, rw, rh) {
    const cs = 18;
    g.fillStyle(0x1a0a04, 0.25);
    // top-left
    g.fillTriangle(rx, ry, rx + cs, ry, rx, ry + cs);
    // top-right
    g.fillTriangle(rx + rw, ry, rx + rw - cs, ry, rx + rw, ry + cs);
    // bottom-left
    g.fillTriangle(rx, ry + rh, rx + cs, ry + rh, rx, ry + rh - cs);
    // bottom-right
    g.fillTriangle(rx + rw, ry + rh, rx + rw - cs, ry + rh, rx + rw, ry + rh - cs);
  }

  // ── Iteration 4: globe on desk ──
  drawGlobe(g, cx, cy, r) {
    g.fillStyle(0x3a5a3a, 0.8);
    g.fillCircle(cx, cy, r);
    g.lineStyle(1, 0x2a4a2a, 0.9);
    g.strokeCircle(cx, cy, r);
    // lines on globe
    g.lineBetween(cx - r, cy, cx + r, cy);
    g.lineBetween(cx, cy - r, cx, cy + r);
  }

  // ── Iteration 4: candle with flame ──
  drawCandle(g, cx, cy) {
    g.fillStyle(0xe0d8c0, 1);
    g.fillRect(cx - 1, cy, 3, 8);
    g.fillStyle(0xf0a030, 0.9);
    g.fillCircle(cx + 0.5, cy - 1, 2);
    g.fillStyle(0xffe060, 0.7);
    g.fillCircle(cx + 0.5, cy - 1, 1);
  }

  // ── Iteration 4: hourglass ──
  drawHourglass(g, cx, cy) {
    g.lineStyle(1, 0x8a7a4a, 1);
    // top triangle
    g.fillStyle(0xd0b070, 0.6);
    g.fillTriangle(cx - 4, cy - 5, cx + 4, cy - 5, cx, cy);
    // bottom triangle
    g.fillStyle(0xd0b070, 0.9);
    g.fillTriangle(cx - 4, cy + 5, cx + 4, cy + 5, cx, cy);
    // frame
    g.lineBetween(cx - 5, cy - 6, cx + 5, cy - 6);
    g.lineBetween(cx - 5, cy + 6, cx + 5, cy + 6);
  }

  // ── Iteration 4: mug on table ──
  drawMug(g, x, y) {
    g.fillStyle(0x6a4a2a, 1);
    g.fillRect(x, y, 5, 6);
    // handle
    g.lineStyle(1, 0x5a3a1a, 1);
    g.lineBetween(x + 5, y + 1, x + 7, y + 1);
    g.lineBetween(x + 7, y + 1, x + 7, y + 4);
    g.lineBetween(x + 7, y + 4, x + 5, y + 4);
  }

  // ── Iteration 4: horseshoe ──
  drawHorseshoe(g, cx, cy) {
    g.lineStyle(2, 0x6a6a6a, 1);
    g.beginPath();
    g.arc(cx, cy, 5, Math.PI, 0, false);
    g.strokePath();
    // legs
    g.lineBetween(cx - 5, cy, cx - 5, cy + 4);
    g.lineBetween(cx + 5, cy, cx + 5, cy + 4);
  }

  drawAllRooms() {
    const g = this.add.graphics();

    // ─── LIBRARY (top-left) ───
    const lib = roomPos(0, 0);
    this.drawFloorPlanks(g, lib.x, lib.y, ROOM_W, ROOM_H, PAL.floor1, PAL.floor2, 12);
    // Iteration 2: rugs
    this.drawRug(g, lib.x + 60, lib.y + 150, 35, 25, 0x8a1818);
    this.drawRug(g, lib.x + 130, lib.y + 60, 28, 20, 0x18388a);
    // Iteration 5: corner shadows
    this.drawCornerShadows(g, lib.x, lib.y, ROOM_W, ROOM_H);
    // shadow corners (original)
    g.fillStyle(PAL.shadow, 0.3);
    g.fillRect(lib.x, lib.y, 30, 20);
    g.fillRect(lib.x, lib.y + ROOM_H - 20, 30, 20);
    // North wall bookshelf
    this.drawBookshelf(g, lib.x + 8, lib.y + 4, ROOM_W - 16, 24);
    // West wall bookshelf
    this.drawBookshelf(g, lib.x + 4, lib.y + 30, 20, ROOM_H - 60);
    // Reading desk
    g.fillStyle(PAL.table, 1);
    g.fillRect(lib.x + 80, lib.y + 100, 50, 30);
    g.fillStyle(PAL.tableLeg, 1);
    g.fillRect(lib.x + 82, lib.y + 102, 3, 3);
    g.fillRect(lib.x + 125, lib.y + 102, 3, 3);
    g.fillRect(lib.x + 82, lib.y + 125, 3, 3);
    g.fillRect(lib.x + 125, lib.y + 125, 3, 3);
    // Paper on desk
    this.pageRect = { x: lib.x + 95, y: lib.y + 108, w: 14, h: 10 };
    const pageGfx = this.add.graphics();
    pageGfx.fillStyle(0xf0e8d0, 1);
    pageGfx.fillRect(this.pageRect.x, this.pageRect.y, this.pageRect.w, this.pageRect.h);
    this.pageGraphics = pageGfx;
    // Iteration 4: globe on desk
    this.drawGlobe(g, lib.x + 86, lib.y + 107, 5);
    // Iteration 4: candle
    this.drawCandle(g, lib.x + 120, lib.y + 104);
    // Iteration 4: scattered paper sheets near desk
    g.fillStyle(0xf0e8d0, 0.7);
    g.fillRect(lib.x + 75, lib.y + 135, 6, 5);
    g.fillRect(lib.x + 135, lib.y + 112, 5, 4);
    g.fillRect(lib.x + 68, lib.y + 110, 5, 6);
    // Iteration 4: hourglass near bookshelf
    this.drawHourglass(g, lib.x + 12, lib.y + 145);
    // Lantern top-right corner
    this.drawLanternGlow(lib.x + ROOM_W - 20, lib.y + 20, 45, 0.6);
    // Iteration 1: amber glow pool — library
    this.drawAmbientGlow(lib.x + ROOM_W - 20, lib.y + 20, 60, 0.12, 0xf0a030);
    // Iteration 3: Scholar NPC (white-haired, holds book)
    const scholar = this.drawNPC(g, lib.x + 105, lib.y + 90, NPC_COLORS.scholar, 'scholar');
    this.npcs.push({ ...scholar, bounds: { x: lib.x + 30, y: lib.y + 30, w: ROOM_W - 50, h: ROOM_H - 50 } });

    // ─── TAVERN (top-right) ───
    const tav = roomPos(1, 0);
    this.drawFloorPlanks(g, tav.x, tav.y, ROOM_W, ROOM_H, PAL.floorWarm1, PAL.floorWarm2, 12);
    // Iteration 2: rugs
    this.drawRug(g, tav.x + 30, tav.y + 160, 40, 22, 0x8a1818);
    this.drawRug(g, tav.x + 100, tav.y + 170, 30, 18, 0x18388a);
    // Iteration 5: corner shadows
    this.drawCornerShadows(g, tav.x, tav.y, ROOM_W, ROOM_H);
    g.fillStyle(PAL.shadow, 0.25);
    g.fillRect(tav.x + ROOM_W - 30, tav.y, 30, 20);
    // Counter along north wall
    g.fillStyle(PAL.barrel, 1);
    g.fillRect(tav.x + 20, tav.y + 8, ROOM_W - 40, 18);
    g.fillStyle(PAL.wallDark, 1);
    g.fillRect(tav.x + 20, tav.y + 8, ROOM_W - 40, 2);
    // Barrels behind counter
    this.drawBarrel(g, tav.x + 40, tav.y + 18, 8);
    this.drawBarrel(g, tav.x + 60, tav.y + 16, 8);
    this.drawBarrel(g, tav.x + 80, tav.y + 18, 8);
    // Iteration 4: hanging sign above counter
    this.add.text(tav.x + 95, tav.y + 30, '\u{1F37A} Ale 2G', {
      fontFamily: 'monospace', fontSize: '7px', color: '#e0d0b0'
    });
    // Iteration 4: chalkboard menu on wall
    g.fillStyle(0x1a2a1a, 1);
    g.fillRect(tav.x + ROOM_W - 40, tav.y + 135, 28, 36);
    g.lineStyle(1, 0x4a4a3a, 0.8);
    g.strokeRect(tav.x + ROOM_W - 40, tav.y + 135, 28, 36);
    // chalk lines
    g.lineStyle(1, 0xc0c0b0, 0.5);
    for (let li = 0; li < 4; li++) {
      g.lineBetween(tav.x + ROOM_W - 36, tav.y + 142 + li * 7, tav.x + ROOM_W - 18, tav.y + 142 + li * 7);
    }
    // Round tables with stools
    const tables = [
      { cx: tav.x + 60, cy: tav.y + 100 },
      { cx: tav.x + 140, cy: tav.y + 130 }
    ];
    tables.forEach(t => {
      g.fillStyle(PAL.table, 1);
      g.fillCircle(t.cx, t.cy, 14);
      g.lineStyle(1, PAL.tableLeg, 1);
      g.strokeCircle(t.cx, t.cy, 14);
      const offsets = [[-18, 0], [18, 0], [0, -18], [0, 18]];
      offsets.forEach(o => {
        g.fillStyle(PAL.bookshelf, 1);
        g.fillCircle(t.cx + o[0], t.cy + o[1], 4);
      });
    });
    // Iteration 4: mugs on tables
    this.drawMug(g, tav.x + 55, tav.y + 96);
    this.drawMug(g, tav.x + 64, tav.y + 98);
    this.drawMug(g, tav.x + 135, tav.y + 126);
    // East wall shelves with bottles
    g.fillStyle(PAL.bookshelf, 1);
    g.fillRect(tav.x + ROOM_W - 22, tav.y + 40, 16, 80);
    for (let by = 0; by < 80; by += 14) {
      g.fillStyle(PAL.wallDark, 1);
      g.fillRect(tav.x + ROOM_W - 22, tav.y + 40 + by, 16, 1);
      for (let bx = 0; bx < 14; bx += 5) {
        g.fillStyle(0x3a6a4a, 0.8);
        g.fillRect(tav.x + ROOM_W - 20 + bx, tav.y + 40 + by + 3, 3, 9);
        g.fillStyle(0x2a5a3a, 1);
        g.fillRect(tav.x + ROOM_W - 20 + bx, tav.y + 40 + by + 2, 3, 2);
      }
    }
    // Lanterns
    this.drawLanternGlow(tav.x + 50, tav.y + 60, 50, 0.5);
    this.drawLanternGlow(tav.x + 150, tav.y + 80, 45, 0.55);
    // Iteration 1: TWO amber glow pools — tavern
    this.drawAmbientGlow(tav.x + 60, tav.y + 100, 50, 0.15, 0xf0a030);
    this.drawAmbientGlow(tav.x + 140, tav.y + 130, 50, 0.15, 0xf0a030);
    // Iteration 3: Innkeeper NPC (apron, brown pants, behind counter)
    const innkeeper = this.drawNPC(g, tav.x + 110, tav.y + 38, NPC_COLORS.innkeeper, 'innkeeper');
    this.npcs.push({ ...innkeeper, bounds: { x: tav.x + 30, y: tav.y + 30, w: ROOM_W - 60, h: 30 } });
    // Iteration 3: Patron NPC (green tunic, seated)
    const patron = this.drawNPC(g, tav.x + 60, tav.y + 85, NPC_COLORS.patron, 'patron');
    this.npcs.push({ ...patron, bounds: { x: tav.x + 30, y: tav.y + 50, w: ROOM_W - 60, h: ROOM_H - 80 } });

    // ─── STORAGE (bottom-left) ───
    const sto = roomPos(0, 1);
    this.drawFloorPlanks(g, sto.x, sto.y, ROOM_W, ROOM_H, PAL.floorDark1, PAL.floorDark2, 14);
    g.fillStyle(PAL.shadow, 0.35);
    g.fillRect(sto.x, sto.y, ROOM_W, ROOM_H);
    g.fillStyle(PAL.shadow, 0.15);
    g.fillRect(sto.x, sto.y, ROOM_W, ROOM_H);
    // Iteration 2: dirt/dust dots
    this.drawDirtDots(g, sto.x, sto.y, ROOM_W, ROOM_H);
    // Iteration 5: corner shadows
    this.drawCornerShadows(g, sto.x, sto.y, ROOM_W, ROOM_H);
    // Barrels 3×2 grid
    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 3; c++) {
        this.drawBarrel(g, sto.x + 30 + c * 30, sto.y + 50 + r * 30, 11);
      }
    }
    // Crates stacked
    this.drawCrate(g, sto.x + 130, sto.y + 40, 18);
    this.drawCrate(g, sto.x + 150, sto.y + 38, 16);
    this.drawCrate(g, sto.x + 138, sto.y + 58, 14);
    // Pots near walls
    g.fillStyle(0x6a4a30, 1);
    g.fillCircle(sto.x + 20, sto.y + ROOM_H - 30, 7);
    g.fillCircle(sto.x + 38, sto.y + ROOM_H - 25, 6);
    g.fillStyle(0x5a3a20, 1);
    g.fillCircle(sto.x + ROOM_W - 25, sto.y + ROOM_H - 35, 8);
    // Iteration 4: hanging sausage/food from ceiling
    const foods = [
      { x: sto.x + 60, len: 20 },
      { x: sto.x + 80, len: 16 },
      { x: sto.x + 120, len: 22 },
    ];
    foods.forEach(f => {
      g.lineStyle(1, 0x5a3a1a, 0.7);
      g.lineBetween(f.x, sto.y + 4, f.x, sto.y + 4 + f.len);
      g.fillStyle(0x8a3020, 0.8);
      g.fillEllipse(f.x, sto.y + 4 + f.len + 4, 4, 6);
    });
    // Iteration 4: cobweb in corner
    g.lineStyle(1, 0x8a8a8a, 0.4);
    g.lineBetween(sto.x + ROOM_W - 2, sto.y + 2, sto.x + ROOM_W - 20, sto.y + 2);
    g.lineBetween(sto.x + ROOM_W - 2, sto.y + 2, sto.x + ROOM_W - 2, sto.y + 20);
    g.beginPath();
    g.arc(sto.x + ROOM_W - 2, sto.y + 2, 18, 0.5 * Math.PI, Math.PI, false);
    g.strokePath();
    g.beginPath();
    g.arc(sto.x + ROOM_W - 2, sto.y + 2, 12, 0.5 * Math.PI, Math.PI, false);
    g.strokePath();
    // Iteration 4: key ring on wall
    g.lineStyle(1, 0x8a8a6a, 0.7);
    g.strokeCircle(sto.x + 15, sto.y + 100, 5);
    g.fillStyle(0x6a6a4a, 0.6);
    g.fillCircle(sto.x + 12, sto.y + 104, 2);
    g.fillCircle(sto.x + 18, sto.y + 104, 2);
    g.fillCircle(sto.x + 15, sto.y + 106, 2);
    // Dim lantern
    this.drawLanternGlow(sto.x + ROOM_W - 25, sto.y + 20, 30, 0.35);
    // Iteration 1: dim cool glow — storage
    this.drawAmbientGlow(sto.x + ROOM_W - 25, sto.y + 20, 40, 0.08, 0xd08020);
    // Iteration 3: Worker NPC (grey, hunched)
    const worker = this.drawNPC(g, sto.x + 100, sto.y + 140, NPC_COLORS.worker, 'worker');
    this.npcs.push({ ...worker, bounds: { x: sto.x + 20, y: sto.y + 20, w: ROOM_W - 40, h: ROOM_H - 40 } });

    // ─── WORKSHOP (bottom-right) ───
    const wrk = roomPos(1, 1);
    this.drawFloorPlanks(g, wrk.x, wrk.y, ROOM_W, ROOM_H, PAL.floorStone1, PAL.floorStone2, 14);
    // Iteration 2: scorch marks & metal shavings
    this.drawScorchAndShavings(g, wrk.x + 90, wrk.y + 75, wrk.x + 90, wrk.y + 55);
    // Iteration 5: corner shadows
    this.drawCornerShadows(g, wrk.x, wrk.y, ROOM_W, ROOM_H);
    // Forge/anvil
    g.fillStyle(0x2a2a2a, 1);
    g.fillRect(wrk.x + 70, wrk.y + 60, 40, 30);
    g.fillStyle(0x1a1a1a, 1);
    g.fillRect(wrk.x + 75, wrk.y + 65, 30, 20);
    // Anvil top
    g.fillStyle(0x4a4a4a, 1);
    g.fillRect(wrk.x + 78, wrk.y + 55, 24, 10);
    // Forge glow
    const forgeGlow = this.add.graphics();
    forgeGlow.fillStyle(PAL.forgeGlow, 0.2);
    forgeGlow.fillCircle(wrk.x + 90, wrk.y + 75, 50);
    forgeGlow.fillStyle(PAL.forgeGlow, 0.35);
    forgeGlow.fillCircle(wrk.x + 90, wrk.y + 70, 25);
    forgeGlow.fillStyle(0xff6030, 0.5);
    forgeGlow.fillCircle(wrk.x + 90, wrk.y + 65, 10);
    this.forgeGlows.push(forgeGlow);
    // Iteration 1: RED-ORANGE glow from forge
    this.drawAmbientGlow(wrk.x + 90, wrk.y + 70, 70, 0.20, 0xe04010);
    // Iteration 4: bucket near anvil
    g.fillStyle(0x5a5a5a, 0.8);
    g.fillRect(wrk.x + 50, wrk.y + 82, 12, 10);
    g.fillRect(wrk.x + 48, wrk.y + 81, 16, 2);
    g.lineStyle(1, 0x4a4a4a, 0.8);
    g.lineBetween(wrk.x + 50, wrk.y + 80, wrk.x + 56, wrk.y + 76);
    g.lineBetween(wrk.x + 62, wrk.y + 80, wrk.x + 56, wrk.y + 76);
    // Iteration 4: bellows near forge
    g.fillStyle(0x6a4a2a, 0.8);
    g.fillEllipse(wrk.x + 125, wrk.y + 72, 12, 8);
    g.fillStyle(0x5a3a1a, 1);
    g.fillRect(wrk.x + 131, wrk.y + 69, 8, 3);
    // Tool wall (north)
    g.fillStyle(PAL.wallInner, 1);
    g.fillRect(wrk.x + 20, wrk.y + 6, ROOM_W - 40, 18);
    // Hanging tools
    g.lineStyle(2, 0x6a6a6a, 1);
    g.lineBetween(wrk.x + 40, wrk.y + 10, wrk.x + 40, wrk.y + 22);
    g.fillStyle(0x5a5a5a, 1);
    g.fillRect(wrk.x + 35, wrk.y + 9, 10, 5);
    g.lineStyle(2, 0x6a6a6a, 1);
    g.lineBetween(wrk.x + 70, wrk.y + 10, wrk.x + 68, wrk.y + 22);
    g.lineBetween(wrk.x + 74, wrk.y + 10, wrk.x + 76, wrk.y + 22);
    g.lineBetween(wrk.x + 100, wrk.y + 10, wrk.x + 100, wrk.y + 22);
    g.fillStyle(0x5a5a5a, 1);
    g.fillRect(wrk.x + 96, wrk.y + 8, 8, 5);
    g.lineStyle(2, 0x6a6a6a, 1);
    g.lineBetween(wrk.x + 130, wrk.y + 10, wrk.x + 150, wrk.y + 10);
    g.lineBetween(wrk.x + 130, wrk.y + 10, wrk.x + 130, wrk.y + 20);
    // Iteration 4: horseshoes on tool wall
    this.drawHorseshoe(g, wrk.x + 55, wrk.y + 14);
    this.drawHorseshoe(g, wrk.x + 115, wrk.y + 14);
    // Workbench along south
    g.fillStyle(PAL.table, 1);
    g.fillRect(wrk.x + 15, wrk.y + ROOM_H - 40, ROOM_W - 30, 24);
    g.fillStyle(PAL.tableLeg, 1);
    g.fillRect(wrk.x + 17, wrk.y + ROOM_H - 18, 4, 4);
    g.fillRect(wrk.x + ROOM_W - 21, wrk.y + ROOM_H - 18, 4, 4);
    // Scattered items on workbench
    g.fillStyle(0x8a8a8a, 1);
    g.fillRect(wrk.x + 30, wrk.y + ROOM_H - 36, 8, 4);
    g.fillRect(wrk.x + 60, wrk.y + ROOM_H - 38, 5, 6);
    g.fillStyle(0xaa6a2a, 1);
    g.fillRect(wrk.x + 90, wrk.y + ROOM_H - 36, 12, 5);
    g.fillRect(wrk.x + 120, wrk.y + ROOM_H - 37, 6, 4);
    // Lantern
    this.drawLanternGlow(wrk.x + 20, wrk.y + 100, 35, 0.4);
    // Iteration 3: Blacksmith NPC (stocky, leather apron)
    const smith = this.drawNPC(g, wrk.x + 90, wrk.y + 100, NPC_COLORS.smith, 'smith');
    this.npcs.push({ ...smith, bounds: { x: wrk.x + 40, y: wrk.y + 40, w: 80, h: 80 } });

    this.mainGfx = g;
  }

  drawWallsAndDoors() {
    const g = this.add.graphics();

    const rooms = [
      roomPos(0, 0), roomPos(1, 0),
      roomPos(0, 1), roomPos(1, 1)
    ];

    rooms.forEach((r, i) => {
      g.lineStyle(WALL_T, PAL.wall, 1);
      g.strokeRect(r.x - WALL_T / 2, r.y - WALL_T / 2, ROOM_W + WALL_T, ROOM_H + WALL_T);
    });

    // Doorway: Library ↔ Tavern
    const doorLT = { x: rooms[0].x + ROOM_W, y: rooms[0].y + (ROOM_H - DOOR_W) / 2 };
    this.drawDoorway(g, doorLT.x - WALL_T / 2 - 2, doorLT.y, WALL_T + 4, DOOR_W, 'vertical');

    // Doorway: Storage ↔ Workshop
    const doorSW = { x: rooms[2].x + ROOM_W, y: rooms[2].y + (ROOM_H - DOOR_W) / 2 };
    this.drawDoorway(g, doorSW.x - WALL_T / 2 - 2, doorSW.y, WALL_T + 4, DOOR_W, 'vertical');

    // Doorway: Library ↔ Storage
    const doorLS = { x: rooms[0].x + (ROOM_W - DOOR_W) / 2, y: rooms[0].y + ROOM_H };
    this.drawDoorway(g, doorLS.x, doorLS.y - WALL_T / 2 - 2, DOOR_W, WALL_T + 4, 'horizontal');

    // Doorway: Tavern ↔ Workshop
    const doorTW = { x: rooms[1].x + (ROOM_W - DOOR_W) / 2, y: rooms[1].y + ROOM_H };
    this.drawDoorway(g, doorTW.x, doorTW.y - WALL_T / 2 - 2, DOOR_W, WALL_T + 4, 'horizontal');
  }

  drawDoorway(g, x, y, w, h, orientation) {
    g.fillStyle(PAL.floor1, 1);
    g.fillRect(x, y, w, h);

    // Iteration 5: brighter threshold strip
    g.fillStyle(0xffffff, 0.08);
    if (orientation === 'vertical') {
      g.fillRect(x + w / 2 - 1, y, 2, h);
    } else {
      g.fillRect(x, y + h / 2 - 1, w, 2);
    }

    const chamfer = 6;
    g.lineStyle(2, PAL.wallInner, 1);

    if (orientation === 'vertical') {
      g.lineBetween(x, y + chamfer, x, y + h - chamfer);
      g.lineBetween(x, y + chamfer, x + chamfer, y);
      g.lineBetween(x, y + h - chamfer, x + chamfer, y + h);
      g.lineBetween(x + w, y + chamfer, x + w, y + h - chamfer);
      g.lineBetween(x + w, y + chamfer, x + w - chamfer, y);
      g.lineBetween(x + w, y + h - chamfer, x + w - chamfer, y + h);
    } else {
      g.lineBetween(x + chamfer, y, x + w - chamfer, y);
      g.lineBetween(x + chamfer, y, x, y + chamfer);
      g.lineBetween(x + w - chamfer, y, x + w, y + chamfer);
      g.lineBetween(x + chamfer, y + h, x + w - chamfer, y + h);
      g.lineBetween(x + chamfer, y + h, x, y + h - chamfer);
      g.lineBetween(x + w - chamfer, y + h, x + w, y + h - chamfer);
    }

    g.fillStyle(PAL.floor3, 0.6);
    g.fillRect(x + 2, y + 2, w - 4, h - 4);
  }

  // ── Iteration 5: cinematic vignette ──
  drawVignette() {
    const vig = this.add.graphics();
    // radial vignette — multiple concentric rectangles with increasing alpha
    const steps = 8;
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      const alpha = t * t * 0.35;
      const margin = (1 - t) * 0.35;
      vig.fillStyle(0x0d0a07, alpha);
      vig.fillRect(0, 0, W * margin, H);
      vig.fillRect(W - W * margin, 0, W * margin, H);
      vig.fillRect(0, 0, W, H * margin);
      vig.fillRect(0, H - H * margin, W, H * margin);
    }
  }

  drawHUD() {
    const g = this.add.graphics();
    g.fillStyle(PAL.hudBg, 0.5);
    g.fillRect(0, 0, W, 30);
    g.fillStyle(PAL.wall, 0.6);
    g.fillRect(0, 29, W, 1);

    this.add.text(12, 7, '\u{1F3E0} Takamachi Inn \u2014 Year 1, Autumn', {
      fontFamily: 'monospace', fontSize: '12px', color: '#e0d0b0'
    });

    this.add.text(W - 80, 7, '\u{1F4B0} 1,240G', {
      fontFamily: 'monospace', fontSize: '12px', color: '#f0a030'
    });
  }

  startAnimations() {
    // Lantern pulse (also drives ambient glow pools — Iteration 1)
    this.time.addEvent({
      delay: 50,
      loop: true,
      callback: () => {
        const t = this.time.now;
        this.lanternGlows.forEach(lg => {
          const phase = lg.phase + t * 0.002;
          const alpha = lg.baseAlpha + Math.sin(phase) * 0.2;
          lg.gfx.setAlpha(Math.max(0.1, Math.min(1, alpha)));
        });
        // ambient glow pools pulse in sync
        this.ambientGlows.forEach(ag => {
          const phase = ag.phase + t * 0.002;
          const alpha = ag.baseAlpha + Math.sin(phase) * 0.15;
          ag.gfx.setAlpha(Math.max(0.3, Math.min(1, alpha)));
        });
      }
    });

    // Forge flicker
    this.time.addEvent({
      delay: 80,
      loop: true,
      callback: () => {
        this.forgeGlows.forEach(fg => {
          const flicker = 0.3 + Math.random() * 0.5;
          fg.setAlpha(flicker);
        });
      }
    });

    // Page reading animation
    this.time.addEvent({
      delay: 100,
      loop: true,
      callback: () => {
        if (this.pageGraphics) {
          const pulse = 0.5 + Math.sin(this.time.now * 0.001) * 0.4;
          this.pageGraphics.setAlpha(pulse);
        }
      }
    });

    // ── Iteration 5: dust motes in library & tavern ──
    const lib = roomPos(0, 0);
    const tav = roomPos(1, 0);
    const dustAreas = [
      { x: lib.x + 40, y: lib.y + 40, w: ROOM_W - 60, h: ROOM_H - 60 },
      { x: lib.x + 100, y: lib.y + 60, w: 60, h: 80 },
      { x: lib.x + 150, y: lib.y + 30, w: 30, h: 50 },
      { x: tav.x + 40, y: tav.y + 50, w: ROOM_W - 60, h: ROOM_H - 80 },
      { x: tav.x + 80, y: tav.y + 70, w: 60, h: 60 },
    ];
    for (let i = 0; i < 6; i++) {
      const area = dustAreas[i % dustAreas.length];
      this.dustMotes.push({
        x: area.x + Math.random() * area.w,
        y: area.y + Math.random() * area.h,
        phase: Math.random() * Math.PI * 2,
        speed: 0.0005 + Math.random() * 0.0008,
        driftX: (Math.random() - 0.5) * 0.05,
        driftY: -0.02 - Math.random() * 0.02,
        area: area,
      });
    }
    this.dustGfx = this.add.graphics();
    this.time.addEvent({
      delay: 60,
      loop: true,
      callback: () => {
        this.dustGfx.clear();
        const t = this.time.now;
        this.dustMotes.forEach(d => {
          d.x += d.driftX;
          d.y += d.driftY;
          // wrap within area
          if (d.y < d.area.y) d.y = d.area.y + d.area.h;
          if (d.x < d.area.x) d.x = d.area.x + d.area.w;
          if (d.x > d.area.x + d.area.w) d.x = d.area.x;
          const alpha = Math.max(0, (Math.sin(t * d.speed + d.phase) + 1) * 0.25);
          this.dustGfx.fillStyle(0xffffff, alpha);
          this.dustGfx.fillCircle(d.x, d.y, 0.8);
        });
      }
    });

    // NPC idle drift
    this.npcGfx = this.add.graphics();
    this.time.addEvent({
      delay: 100,
      loop: true,
      callback: () => {
        this.npcGfx.clear();
        this.npcs.forEach(npc => {
          npc.timer -= 100;
          if (npc.timer <= 0) {
            npc.dx = (Math.random() - 0.5) * 0.3;
            npc.dy = (Math.random() - 0.5) * 0.3;
            npc.timer = 3000 + Math.random() * 2000;
          }
          npc.x += npc.dx;
          npc.y += npc.dy;
          const b = npc.bounds;
          if (b) {
            npc.x = Math.max(b.x, Math.min(b.x + b.w, npc.x));
            npc.y = Math.max(b.y, Math.min(b.y + b.h, npc.y));
          }
          this.drawNPCAt(this.npcGfx, npc);
        });
      }
    });
  }

  drawNPCAt(g, npc) {
    const cx = npc.x, cy = npc.y;
    const w = npc.w, h = npc.h;
    const origColors = this.getNPCOrigColors(npc);

    // shadow under feet
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(cx, cy + h / 2 + 2, w + 4, 5);

    // body
    if (npc.type === 'worker') {
      g.fillStyle(origColors.body, 1);
      g.fillRect(cx - w / 2 - 1, cy - h / 2 + 3, w, h - 3);
    } else {
      g.fillStyle(origColors.body, 1);
      g.fillRect(cx - w / 2, cy - h / 2 + 3, w, h - 3);
    }
    if (origColors.apron) {
      g.fillStyle(origColors.apron, 1);
      g.fillRect(cx - w / 2 + 1, cy - h / 2 + 5, w - 2, h - 6);
    }
    // smith leather apron
    if (npc.type === 'smith') {
      g.fillStyle(0x6a3020, 1);
      g.fillRect(cx - w / 2 + 1, cy - h / 2 + 6, w - 2, h - 7);
    }
    // innkeeper brown pants
    if (npc.type === 'innkeeper') {
      g.fillStyle(0x5a3a18, 1);
      g.fillRect(cx - w / 2, cy + 2, w, 5);
    }

    // feet
    g.fillStyle(0x3a2010, 1);
    g.fillCircle(cx - 2, cy + h / 2 + 1, 1.5);
    g.fillCircle(cx + 2, cy + h / 2 + 1, 1.5);

    // head
    g.fillStyle(PAL.skin, 1);
    g.fillCircle(cx, cy - h / 2 + 2, 4);
    if (npc.type === 'scholar') {
      g.fillStyle(0xd0d0d0, 1);
    } else {
      g.fillStyle(origColors.hair, 1);
    }
    g.fillRect(cx - 3, cy - h / 2 - 2, 6, 3);

    // scholar holds open book
    if (npc.type === 'scholar') {
      g.fillStyle(0xf0e8d0, 1);
      g.fillRect(cx - 6, cy, 12, 4);
      g.fillStyle(0x000000, 0.3);
      g.fillRect(cx, cy, 1, 4);
    }
  }

  getNPCOrigColors(npc) {
    const idx = this.npcs.indexOf(npc);
    const colorSets = [
      { body: NPC_COLORS.scholar.robe, hair: NPC_COLORS.scholar.hair },
      { body: NPC_COLORS.innkeeper.shirt, hair: NPC_COLORS.innkeeper.hair, apron: NPC_COLORS.innkeeper.apron },
      { body: NPC_COLORS.patron.shirt, hair: NPC_COLORS.patron.hair },
      { body: NPC_COLORS.worker.shirt, hair: NPC_COLORS.worker.hair },
      { body: NPC_COLORS.smith.shirt, hair: NPC_COLORS.smith.hair },
    ];
    return colorSets[idx] || colorSets[0];
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0d0a07',
  scene: TakamachiScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    max: { width: W, height: H }
  }
});
</script>
