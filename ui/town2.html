<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>根岸村 · Negishimura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0e12; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
      #oracle-inbox { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 4px; padding: 6px 24px 8px; background: #0a0e1a; border-top: 1px solid #1a2030; z-index: 9999; }
    #oracle-inbox input { flex: 1; background: #0e1220; border: 1px solid #2a3040; color: #e0d8c8; font-family: monospace; font-size: 13px; padding: 7px 12px; outline: none; border-radius: 2px; }
    #oracle-inbox input:focus { border-color: #f0a030; }
    #oracle-inbox button { background: #f0a030; color: #0a0e1a; border: none; font-size: 14px; padding: 4px 14px; cursor: pointer; font-family: monospace; border-radius: 2px; font-weight: bold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const TILE_W = 48, TILE_H = 24;
const COLS = 7, ROWS = 5;
const W = 480, H = 700;

const PAL = {
  grass1: 0x5a8a3c, grass2: 0x6a9a4a, path: 0x8a7a60,
  blossom: 0xf0b0c0, roofClay: 0xa05020, roofSlate: 0x4a3828,
  houseLeft: 0x6b4226, houseRight: 0x7a4e30, windowAmber: 0xf0a030,
  earth1: 0x5c3a1e, earth2: 0x7a4e2a, crop: 0x3a7a30,
  cropYellow: 0x8a9a20, rootVeg: 0xe06020,
  stone: 0x2a3040, water: 0x2a5880, shimmer: 0x4a8ab0,
  lantern: 0xf0a030,
  wallDark: 0x4a2e0e, wallDark2: 0x3a2208, wallLight: 0x6b4226,
  wallStone: 0x1e2228, wallCrack: 0x2a2e38,
  farmPath: 0x8a6040,
  rootTendril: 0x8b5e3c,
};

const originX = W / 2;

function gridToScreen(col, row, floorY) {
  return {
    x: originX + (col - row) * (TILE_W / 2),
    y: floorY + (col + row) * (TILE_H / 2)
  };
}

function drawDiamond(g, cx, cy, color, alpha) {
  g.fillStyle(color, alpha !== undefined ? alpha : 1);
  g.beginPath();
  g.moveTo(cx, cy - TILE_H / 2);
  g.lineTo(cx + TILE_W / 2, cy);
  g.lineTo(cx, cy + TILE_H / 2);
  g.lineTo(cx - TILE_W / 2, cy);
  g.closePath();
  g.fillPath();
}

function drawDiamondOutline(g, cx, cy) {
  g.lineStyle(1, 0x000000, 0.08);
  g.beginPath();
  g.moveTo(cx, cy - TILE_H / 2);
  g.lineTo(cx + TILE_W / 2, cy);
  g.lineTo(cx, cy + TILE_H / 2);
  g.lineTo(cx - TILE_W / 2, cy);
  g.closePath();
  g.strokePath();
}

// Get floor edge points for wall drawing
function getFloorEdges(fy) {
  const topLeft = gridToScreen(0, 0, fy);
  const topRight = gridToScreen(COLS - 1, 0, fy);
  const bottomLeft = gridToScreen(0, ROWS - 1, fy);
  const bottom = gridToScreen(COLS - 1, ROWS - 1, fy);
  const left = gridToScreen(0, ROWS - 1, fy);
  const right = gridToScreen(COLS - 1, 0, fy);
  return { topLeft, topRight, bottomLeft, bottom, left, right };
}

class NegishimuraScene extends Phaser.Scene {
  create() {
    const g = this.add.graphics();

    // Vertically centre the 3 floors
    const surfaceY = 60;
    const floorGridH = (COLS + ROWS - 1) * (TILE_H / 2); // ~120px
    const gapBetweenFloors = 8; // small gap, walls fill it

    const surfaceBottom = surfaceY + floorGridH;
    const surfaceToFarmWallH = 55;
    const farmY = surfaceBottom + surfaceToFarmWallH + gapBetweenFloors;

    const farmBottom = farmY + floorGridH;
    const farmToDeepWallH = 70;
    const deepY = farmBottom + farmToDeepWallH + gapBetweenFloors;

    // ── Iteration 5: Sky/atmosphere gradient above surface ──
    g.fillStyle(0x0a1428, 0.4);
    g.fillRect(0, 0, W, surfaceY - 5);
    // subtle gradient bands
    g.fillStyle(0x0a1428, 0.25);
    g.fillRect(0, surfaceY - 5, W, 20);

    // ── Iteration 5: Title with glow ──
    // Shadow layers for glow effect
    const titleY = 26;
    this.add.text(W / 2, titleY, '根岸村 · Negishimura', {
      fontFamily: 'monospace', fontSize: '18px', color: '#8090b0',
      align: 'center', shadow: { offsetX: 0, offsetY: 0, color: '#4060a0', blur: 12, fill: true }
    }).setOrigin(0.5);
    this.add.text(W / 2, titleY, '根岸村 · Negishimura', {
      fontFamily: 'monospace', fontSize: '18px', color: '#d0d8e8', align: 'center'
    }).setOrigin(0.5);

    // ── Iteration 2: Connecting wall — surface to farm ──
    this.drawConnectingWall(g, surfaceY, farmY, 'surface-farm');

    // ── Surface floor ──
    this.drawSurfaceFloor(g, surfaceY);
    // Small wall band under surface floor
    this.drawFloorEdgeWall(g, surfaceY, 12, 'surface');

    // ── Iteration 2: Connecting wall — farm to deep ──
    this.drawConnectingWall(g, farmY, deepY, 'farm-deep');

    // ── Farm floor ──
    this.drawFarmFloor(g, farmY);
    // Small wall band under farm
    this.drawFloorEdgeWall(g, farmY, 12, 'farm');

    // ── Deep floor ──
    this.drawDeepFloor(g, deepY);
    this.drawFloorEdgeWall(g, deepY, 18, 'deep');

    // ── Iteration 3: Lantern glow overlays (drawn after farm tiles) ──
    this.drawLanternGlowTiles(g, farmY);

    // ── Iteration 3: Root tendrils along farm floor bottom ──
    this.drawRootTendrils(g, farmY);

    // ── Iteration 5: Fallen petals ON grass tiles ──
    this.drawFallenPetals(g, surfaceY);

    // ── Iteration 4: Animations ──
    this.addPetalDrift(surfaceY);
    this.addWaterSparkles(deepY);
    this.addLanternFlicker(farmY);
    this.addKoiDrift(deepY);
    this.addFireflies(surfaceY);

    // ── SSE: live event stream ──
    this.surfaceY = surfaceY;
    this.farmY = farmY;
    this.deepY = deepY;
    this.connectSSE();
  }

  // ── Iteration 2: Draw continuous side walls connecting floors ──
  drawConnectingWall(g, upperFloorY, lowerFloorY, type) {
    const upperEdges = getFloorEdges(upperFloorY);
    const lowerEdges = getFloorEdges(lowerFloorY);

    // The wall spans from the bottom edge of upper floor to the top edge of lower floor
    const upperBottomY = upperEdges.bottom.y + TILE_H / 2;
    const lowerTopLeftY = lowerEdges.topLeft.y - TILE_H / 2;
    const wallH = lowerTopLeftY - upperBottomY + 12;

    const leftX = upperEdges.left.x;
    const bottomX = upperEdges.bottom.x;
    const rightX = upperEdges.right.x;

    if (type === 'surface-farm') {
      // Left face — dark earth
      g.fillStyle(PAL.wallDark, 1);
      g.beginPath();
      g.moveTo(leftX, upperBottomY);
      g.lineTo(bottomX, upperEdges.bottom.y + TILE_H / 2);
      g.lineTo(bottomX, upperEdges.bottom.y + TILE_H / 2 + wallH);
      g.lineTo(leftX, upperBottomY + wallH);
      g.closePath();
      g.fillPath();

      // Right face — slightly lighter earth
      g.fillStyle(PAL.wallDark2, 1);
      g.beginPath();
      g.moveTo(bottomX, upperEdges.bottom.y + TILE_H / 2);
      g.lineTo(rightX, upperEdges.right.y + TILE_H / 2);
      g.lineTo(rightX, upperEdges.right.y + TILE_H / 2 + wallH);
      g.lineTo(bottomX, upperEdges.bottom.y + TILE_H / 2 + wallH);
      g.closePath();
      g.fillPath();

      // Earth layer bands
      for (let i = 0; i < 4; i++) {
        const bandY = upperBottomY + 12 + i * (wallH / 5);
        const colors = [0x5c3a1e, 0x4a2e0e, 0x3a2208, 0x2e1a06];
        g.fillStyle(colors[i], 0.4);
        g.fillRect(leftX, bandY, bottomX - leftX, wallH / 6);
      }

      // Root lines dangling
      g.lineStyle(1, 0x3a7a30, 0.25);
      for (let i = 0; i < 6; i++) {
        const rx = leftX + 20 + i * 30;
        const ry = upperBottomY + 8;
        g.beginPath();
        g.moveTo(rx, ry);
        g.lineTo(rx + 4, ry + 15 + Math.sin(i) * 8);
        g.lineTo(rx - 2, ry + 28 + Math.cos(i) * 6);
        g.strokePath();
      }
    } else {
      // farm-deep: stone transition
      g.fillStyle(PAL.wallStone, 1);
      g.beginPath();
      g.moveTo(leftX, upperBottomY);
      g.lineTo(bottomX, upperEdges.bottom.y + TILE_H / 2);
      g.lineTo(bottomX, upperEdges.bottom.y + TILE_H / 2 + wallH);
      g.lineTo(leftX, upperBottomY + wallH);
      g.closePath();
      g.fillPath();

      g.fillStyle(0x222838, 1);
      g.beginPath();
      g.moveTo(bottomX, upperEdges.bottom.y + TILE_H / 2);
      g.lineTo(rightX, upperEdges.right.y + TILE_H / 2);
      g.lineTo(rightX, upperEdges.right.y + TILE_H / 2 + wallH);
      g.lineTo(bottomX, upperEdges.bottom.y + TILE_H / 2 + wallH);
      g.closePath();
      g.fillPath();

      // Crack lines
      g.lineStyle(1, PAL.wallCrack, 0.5);
      for (let i = 0; i < 5; i++) {
        const cy = upperBottomY + 10 + i * (wallH / 6);
        const cx = leftX + 15 + (i % 3) * 25;
        g.beginPath();
        g.moveTo(cx, cy);
        g.lineTo(cx + 30 + (i % 2) * 20, cy + 2);
        g.lineTo(cx + 40 + (i % 3) * 15, cy + 6);
        g.strokePath();
      }

      // Stone layer bands
      for (let i = 0; i < 3; i++) {
        const bandY = upperBottomY + wallH * 0.2 + i * (wallH / 4);
        g.fillStyle(0x2a2e38, 0.3);
        g.fillRect(leftX, bandY, bottomX - leftX, 2);
      }
    }
  }

  // Small decorative wall band right under a floor
  drawFloorEdgeWall(g, fy, wallH, type) {
    const left = gridToScreen(0, ROWS - 1, fy);
    const bottom = gridToScreen(COLS - 1, ROWS - 1, fy);
    const right = gridToScreen(COLS - 1, 0, fy);

    const leftColor = type === 'deep' ? PAL.wallStone : PAL.wallDark;
    const rightColor = type === 'deep' ? 0x222838 : PAL.wallLight;

    // Left face
    g.fillStyle(leftColor, 1);
    g.beginPath();
    g.moveTo(left.x, left.y + TILE_H / 2);
    g.lineTo(bottom.x, bottom.y + TILE_H / 2);
    g.lineTo(bottom.x, bottom.y + TILE_H / 2 + wallH);
    g.lineTo(left.x, left.y + TILE_H / 2 + wallH);
    g.closePath();
    g.fillPath();

    // Right face
    g.fillStyle(rightColor, 1);
    g.beginPath();
    g.moveTo(bottom.x, bottom.y + TILE_H / 2);
    g.lineTo(right.x, right.y + TILE_H / 2);
    g.lineTo(right.x, right.y + TILE_H / 2 + wallH);
    g.lineTo(bottom.x, bottom.y + TILE_H / 2 + wallH);
    g.closePath();
    g.fillPath();

    // Surface: grass topsoil stripe
    if (type === 'surface') {
      g.fillStyle(PAL.grass1, 0.3);
      g.beginPath();
      g.moveTo(left.x, left.y + TILE_H / 2);
      g.lineTo(bottom.x, bottom.y + TILE_H / 2);
      g.lineTo(bottom.x, bottom.y + TILE_H / 2 + 6);
      g.lineTo(left.x, left.y + TILE_H / 2 + 6);
      g.closePath();
      g.fillPath();
    }
  }

  drawSurfaceFloor(g, fy) {
    const stream = [[3,0],[3,1],[3,2]];
    const house = [[4,1],[5,1],[4,2],[5,2]];
    const isStream = (c,r) => stream.some(s => s[0]===c && s[1]===r);
    const isHouse = (c,r) => house.some(s => s[0]===c && s[1]===r);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = gridToScreen(c, r, fy);
        if (isStream(c, r)) {
          drawDiamond(g, p.x, p.y, PAL.water);
        } else if (isHouse(c, r)) {
          drawDiamond(g, p.x, p.y, PAL.path);
        } else {
          drawDiamond(g, p.x, p.y, (c + r) % 2 === 0 ? PAL.grass1 : PAL.grass2);
        }
        drawDiamondOutline(g, p.x, p.y);
      }
    }

    // ── Iteration 1: Proper isometric house ──
    this.drawIsometricHouse(g, fy);

    // Cherry blossom trees
    this.drawTree(g, gridToScreen(1, 1, fy));
    this.drawTree(g, gridToScreen(6, 3, fy));
  }

  // ── Iteration 1: Proper isometric house ──
  drawIsometricHouse(g, fy) {
    // House occupies tiles [4,1],[5,1],[4,2],[5,2] — center at 4.5, 1.5
    const hp = gridToScreen(4.5, 1.5, fy);
    const bw = 38; // base width
    const bh = 24; // base height (visible wall)
    const roofH = 14;

    // Left wall (darker)
    g.fillStyle(PAL.houseLeft, 1);
    g.beginPath();
    g.moveTo(hp.x - bw/2, hp.y - bh);
    g.lineTo(hp.x, hp.y - bh + 10);
    g.lineTo(hp.x, hp.y + 2);
    g.lineTo(hp.x - bw/2, hp.y - 8);
    g.closePath();
    g.fillPath();

    // Right wall (medium shade)
    g.fillStyle(PAL.houseRight, 1);
    g.beginPath();
    g.moveTo(hp.x, hp.y - bh + 10);
    g.lineTo(hp.x + bw/2, hp.y - bh);
    g.lineTo(hp.x + bw/2, hp.y - 8);
    g.lineTo(hp.x, hp.y + 2);
    g.closePath();
    g.fillPath();

    // Windows on left wall (amber glow)
    g.fillStyle(PAL.windowAmber, 0.9);
    g.fillRect(hp.x - 14, hp.y - bh + 6, 5, 5);
    g.fillRect(hp.x - 6, hp.y - bh + 10, 4, 4);

    // Windows on right wall
    g.fillStyle(PAL.windowAmber, 0.85);
    g.fillRect(hp.x + 6, hp.y - bh + 6, 5, 5);
    g.fillRect(hp.x + 14, hp.y - bh + 10, 4, 4);

    // Roof (isometric diamond top face) — warm clay
    g.fillStyle(PAL.roofClay, 1);
    g.beginPath();
    g.moveTo(hp.x, hp.y - bh - roofH);       // top
    g.lineTo(hp.x + bw/2 + 4, hp.y - bh + 2);  // right
    g.lineTo(hp.x, hp.y - bh + roofH - 2);      // bottom
    g.lineTo(hp.x - bw/2 - 4, hp.y - bh + 2);   // left
    g.closePath();
    g.fillPath();

    // Roof edge highlight
    g.lineStyle(1, 0x803010, 0.6);
    g.beginPath();
    g.moveTo(hp.x, hp.y - bh - roofH);
    g.lineTo(hp.x + bw/2 + 4, hp.y - bh + 2);
    g.lineTo(hp.x, hp.y - bh + roofH - 2);
    g.lineTo(hp.x - bw/2 - 4, hp.y - bh + 2);
    g.closePath();
    g.strokePath();

    // Chimney nub
    g.fillStyle(0x5a3a20, 1);
    g.fillRect(hp.x + 8, hp.y - bh - roofH - 2, 5, 8);
    g.fillStyle(0x4a2a18, 1);
    g.fillRect(hp.x + 7, hp.y - bh - roofH - 4, 7, 3);
  }

  drawTree(g, pos) {
    // trunk
    g.fillStyle(0x6b4226, 1);
    g.fillRect(pos.x - 2, pos.y - 30, 4, 22);
    // blossoms (cluster of pink ellipses)
    const blossomOffsets = [[0,-36],[6,-33],[-6,-33],[0,-28],[8,-28],[-8,-28],[3,-40],[-3,-40]];
    for (const [ox, oy] of blossomOffsets) {
      g.fillStyle(PAL.blossom, 0.85);
      g.fillEllipse(pos.x + ox, pos.y + oy, 10, 7);
    }
    g.fillStyle(0xffc0d0, 0.6);
    g.fillEllipse(pos.x, pos.y - 34, 6, 5);
  }

  drawFarmFloor(g, fy) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = gridToScreen(c, r, fy);
        const isPath = c === 3;
        if (isPath) {
          // Iteration 3: lighter path
          drawDiamond(g, p.x, p.y, PAL.farmPath);
        } else {
          drawDiamond(g, p.x, p.y, (c + r) % 2 === 0 ? PAL.earth1 : PAL.earth2);
        }
        drawDiamondOutline(g, p.x, p.y);

        // Crops
        if (!isPath && r < 4) {
          const cropColors = [PAL.crop, PAL.cropYellow, PAL.crop, PAL.rootVeg];
          const color = cropColors[r];
          if (r === 3) {
            for (let i = 0; i < 3; i++) {
              g.fillStyle(color, 0.9);
              g.fillCircle(p.x + (i-1)*8, p.y, 2.5);
            }
          } else {
            for (let i = 0; i < 4; i++) {
              g.fillStyle(color, 0.9);
              g.fillRect(p.x - 10 + i * 6, p.y - 3, 3, 6);
            }
          }
        }
      }
    }

    // ── Iteration 3: Proper lantern shape at [3,2] ──
    const lp = gridToScreen(3, 2, fy);
    // Post
    g.fillStyle(0x6b4226, 1);
    g.fillRect(lp.x - 1, lp.y - 16, 2, 12);
    // Lantern body
    g.fillStyle(PAL.lantern, 1);
    g.fillRect(lp.x - 5, lp.y - 22, 10, 8);
    // Glow cap (bright top)
    g.fillStyle(0xffcc44, 0.9);
    g.fillRect(lp.x - 6, lp.y - 24, 12, 3);
    // Base cap
    g.fillStyle(0x6b4226, 1);
    g.fillRect(lp.x - 6, lp.y - 14, 12, 2);
    // Base glow circle (soft)
    g.fillStyle(PAL.lantern, 0.06);
    g.fillCircle(lp.x, lp.y, 50);
  }

  // ── Iteration 3: Amber glow overlays on adjacent tiles ──
  drawLanternGlowTiles(g, fy) {
    // Lantern is at [3,2]. Glow the 8 surrounding tiles + self
    const glowTiles = [
      [2,1,0.15],[3,1,0.22],[4,1,0.15],
      [2,2,0.20],           [4,2,0.20],
      [2,3,0.15],[3,3,0.22],[4,3,0.15],
      [3,2,0.25], // self — brightest
    ];
    for (const [c, r, a] of glowTiles) {
      if (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
        const p = gridToScreen(c, r, fy);
        drawDiamond(g, p.x, p.y, PAL.lantern, a);
      }
    }
  }

  // ── Iteration 3: Root tendrils along farm floor bottom edge ──
  drawRootTendrils(g, fy) {
    const bottomEdgeY = gridToScreen(3, ROWS - 1, fy).y + TILE_H / 2;
    const leftX = gridToScreen(0, ROWS - 1, fy).x;
    const rightX = gridToScreen(COLS - 1, ROWS - 1, fy).x;

    g.lineStyle(1.5, PAL.rootTendril, 0.5);
    const rootPositions = [0.15, 0.3, 0.5, 0.65, 0.85];
    for (let i = 0; i < rootPositions.length; i++) {
      const rx = leftX + (rightX - leftX) * rootPositions[i];
      const ry = bottomEdgeY - 2;
      g.beginPath();
      g.moveTo(rx, ry);
      g.lineTo(rx + (i % 2 === 0 ? 3 : -3), ry + 8);
      g.lineTo(rx + (i % 2 === 0 ? -2 : 4), ry + 16);
      g.lineTo(rx + (i % 2 === 0 ? 1 : -1), ry + 22);
      g.strokePath();
    }
  }

  // ── Iteration 5: Static fallen petals on grass ──
  drawFallenPetals(g, fy) {
    const petalTiles = [[0,0],[0,2],[1,0],[2,1],[1,3],[2,0],[5,3],[6,2],[5,4],[6,4],[0,4]];
    for (const [c, r] of petalTiles) {
      if (c < COLS && r < ROWS) {
        const p = gridToScreen(c, r, fy);
        for (let i = 0; i < 2; i++) {
          g.fillStyle(PAL.blossom, 0.55);
          g.fillCircle(p.x + (Math.sin(c*7+i*3)-0.5)*16, p.y + (Math.cos(r*5+i*2)-0.5)*6, 1.5);
        }
      }
    }
  }

  drawDeepFloor(g, fy) {
    const poolTiles = [];
    for (let c = 1; c <= 5; c++) for (let r = 1; r <= 3; r++) poolTiles.push([c,r]);
    const isPool = (c,r) => poolTiles.some(p => p[0]===c && p[1]===r);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = gridToScreen(c, r, fy);
        if (isPool(c, r)) {
          drawDiamond(g, p.x, p.y, PAL.water);
        } else {
          drawDiamond(g, p.x, p.y, PAL.stone);
          const adjPool = isPool(c-1,r)||isPool(c+1,r)||isPool(c,r-1)||isPool(c,r+1);
          if (adjPool) {
            drawDiamond(g, p.x, p.y, 0x3a4050);
          }
        }
        drawDiamondOutline(g, p.x, p.y);
      }
    }
  }

  // ── Iteration 4: Petal drift — 8 petals drifting downward across surface ──
  addPetalDrift(surfaceY) {
    const floorH = (COLS + ROWS - 1) * (TILE_H / 2);
    for (let i = 0; i < 8; i++) {
      const petal = this.add.graphics();
      petal.fillStyle(PAL.blossom, 0.8);
      petal.fillEllipse(0, 0, 3, 2);

      const startX = 140 + Math.random() * 200;
      const startY = surfaceY - 10 + Math.random() * 20;
      petal.setPosition(startX, startY);

      this.tweens.add({
        targets: petal,
        x: startX + 20 + Math.random() * 30,
        y: surfaceY + floorH + 10,
        alpha: { from: 0.85, to: 0.2 },
        duration: 5000 + Math.random() * 3000,
        delay: i * 600,
        repeat: -1,
        onRepeat: () => {
          petal.setPosition(140 + Math.random() * 200, surfaceY - 10 + Math.random() * 10);
        }
      });
    }
  }

  // ── Iteration 4: Water sparkles — tiny white dots fading in/out ──
  addWaterSparkles(deepY) {
    for (let i = 0; i < 4; i++) {
      const sparkle = this.add.graphics();
      sparkle.fillStyle(0xffffff, 1);
      sparkle.fillCircle(0, 0, 1.5);

      const poolCenter = gridToScreen(3, 2, deepY);
      const sx = poolCenter.x + (Math.random() - 0.5) * 60;
      const sy = poolCenter.y + (Math.random() - 0.5) * 20;
      sparkle.setPosition(sx, sy);
      sparkle.setAlpha(0);

      this.tweens.add({
        targets: sparkle,
        alpha: { from: 0, to: 0.6 },
        duration: 1200 + Math.random() * 800,
        delay: i * 700,
        yoyo: true,
        repeat: -1,
        hold: 200,
        ease: 'Sine.easeInOut',
        onRepeat: () => {
          const nx = poolCenter.x + (Math.random() - 0.5) * 60;
          const ny = poolCenter.y + (Math.random() - 0.5) * 20;
          sparkle.setPosition(nx, ny);
        }
      });
    }
  }

  // ── Iteration 4: Lantern flicker — amber glow tiles pulse ──
  addLanternFlicker(farmY) {
    const glowOverlay = this.add.graphics();
    const glowTiles = [
      [2,1,0.12],[3,1,0.18],[4,1,0.12],
      [2,2,0.16],           [4,2,0.16],
      [2,3,0.12],[3,3,0.18],[4,3,0.12],
      [3,2,0.20],
    ];

    const drawGlow = (alpha) => {
      glowOverlay.clear();
      for (const [c, r, baseA] of glowTiles) {
        if (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
          const p = gridToScreen(c, r, farmY);
          drawDiamond(glowOverlay, p.x, p.y, PAL.lantern, baseA * alpha);
        }
      }
    };

    drawGlow(1);

    // Pulse alpha between 0.6 and 1.1 (clamped via base alpha)
    const pulseObj = { val: 1 };
    this.tweens.add({
      targets: pulseObj,
      val: { from: 0.6, to: 1.1 },
      duration: 900,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut',
      onUpdate: () => { drawGlow(pulseObj.val); }
    });
  }

  // ── Iteration 4: Koi fish slow oval drift ──
  addKoiDrift(deepY) {
    const poolCenter = gridToScreen(3, 2, deepY);
    const koi = this.add.graphics();

    const drawKoi = (x, y) => {
      koi.clear();
      // body
      koi.fillStyle(0xe06020, 0.9);
      koi.fillEllipse(x, y, 10, 5);
      // tail
      koi.fillStyle(0xf0f0f0, 0.8);
      koi.fillEllipse(x + 5, y, 4, 3);
    };

    drawKoi(poolCenter.x, poolCenter.y);

    const pathObj = { angle: 0 };
    this.tweens.add({
      targets: pathObj,
      angle: { from: 0, to: Math.PI * 2 },
      duration: 8000,
      repeat: -1,
      ease: 'Linear',
      onUpdate: () => {
        const kx = poolCenter.x + Math.cos(pathObj.angle) * 22;
        const ky = poolCenter.y + Math.sin(pathObj.angle) * 8;
        drawKoi(kx, ky);
      }
    });
  }

  // ── SSE connection ──
  connectSSE() {
    // Live indicator
    this.liveDot = this.add.graphics();
    this.liveText = this.add.text(22, H - 18, 'live', {
      fontFamily: 'monospace', fontSize: '9px', color: '#ffffff'
    }).setAlpha(0.7);
    this.sseConnected = false;
    this.drawLiveDot();

    // Pulse the dot
    this.time.addEvent({ delay: 800, loop: true, callback: () => {
      if (this.sseConnected) {
        this.liveDot.setAlpha(this.liveDot.alpha > 0.5 ? 0.4 : 1);
      }
    }});

    this.startSSE();
  }

  drawLiveDot() {
    this.liveDot.clear();
    const color = this.sseConnected ? 0x40e040 : 0x808080;
    this.liveDot.fillStyle(color, 1);
    this.liveDot.fillCircle(12, H - 14, 4);
  }

  startSSE() {
    try {
      const es = new EventSource('https://api.kurokimachi.com/events');
      es.onopen = () => {
        this.sseConnected = true;
        this.drawLiveDot();
      };
      es.onerror = () => {
        this.sseConnected = false;
        this.drawLiveDot();
        es.close();
        this.time.delayedCall(3000, () => this.startSSE());
      };
      es.onmessage = (e) => this.handleSSE(e);
      es.addEventListener('message', (e) => this.handleSSE(e));
      es.addEventListener('state:sync', (e) => this.handleSSE(e));
      es.addEventListener('agent:speak', (e) => this.handleSSE(e));
    } catch (err) {
      this.time.delayedCall(3000, () => this.startSSE());
    }
  }

  handleSSE(e) {
    try {
      const data = JSON.parse(e.data);
      const type = data.type || data.event;
      const agentId = data.agentId || (data.meta && data.meta.agentId);

      if (type === 'agent:speak') {
        this.onAgentSpeak(agentId);
      }

      // Check gazette inside state:sync
      if (data.gazette && Array.isArray(data.gazette)) {
        data.gazette.forEach(item => {
          if (item.type === 'agent:speak') {
            this.onAgentSpeak(item.agentId || (item.meta && item.meta.agentId));
          }
        });
      }
    } catch (err) { /* ignore parse errors */ }
  }

  onAgentSpeak(agentId) {
    // Cherry petal burst on surface
    this.spawnPetalBurst();
    // Crop flash on farm
    this.flashRandomCrop();

    if (agentId === 'forge') {
      this.sproutCrop();
    }
    if (agentId === 'sage' || agentId === 'lumen') {
      this.waterRipple();
    }
  }

  spawnPetalBurst() {
    const floorH = (COLS + ROWS - 1) * (TILE_H / 2);
    for (let i = 0; i < 5; i++) {
      const petal = this.add.graphics();
      petal.fillStyle(PAL.blossom, 0.9);
      petal.fillEllipse(0, 0, 3, 2);
      const startX = 140 + Math.random() * 200;
      petal.setPosition(startX, this.surfaceY - 5);
      this.tweens.add({
        targets: petal,
        x: startX + (Math.random() - 0.5) * 40,
        y: this.surfaceY + floorH + 10,
        alpha: { from: 0.9, to: 0 },
        duration: 1500 + Math.random() * 1000,
        delay: i * 80,
        onComplete: () => petal.destroy()
      });
    }
  }

  flashRandomCrop() {
    const c = Math.floor(Math.random() * COLS);
    const r = Math.floor(Math.random() * 4);
    if (c === 3) return; // skip path
    const p = gridToScreen(c, r, this.farmY);
    const flash = this.add.graphics();
    flash.fillStyle(0xffffff, 0);
    drawDiamond(flash, p.x, p.y, PAL.lantern, 0);

    const obj = { alpha: 0 };
    this.tweens.add({
      targets: obj,
      alpha: { from: 0, to: 1 },
      duration: 150,
      yoyo: true,
      onUpdate: () => {
        flash.clear();
        drawDiamond(flash, p.x, p.y, PAL.lantern, obj.alpha * 0.5);
      },
      onComplete: () => flash.destroy()
    });
  }

  sproutCrop() {
    const c = Math.floor(Math.random() * COLS);
    const r = Math.floor(Math.random() * 4);
    if (c === 3) return;
    const p = gridToScreen(c, r, this.farmY);
    const sprout = this.add.graphics();
    const maxH = 8;
    const obj = { h: 0 };

    this.tweens.add({
      targets: obj,
      h: { from: 0, to: maxH },
      duration: 500,
      onUpdate: () => {
        sprout.clear();
        sprout.fillStyle(PAL.crop, 0.9);
        sprout.fillRect(p.x - 1, p.y - obj.h, 3, obj.h);
      },
      onComplete: () => {
        this.time.delayedCall(2000, () => {
          this.tweens.add({
            targets: sprout,
            alpha: 0,
            duration: 500,
            onComplete: () => sprout.destroy()
          });
        });
      }
    });
  }

  waterRipple() {
    const poolCenter = gridToScreen(3, 2, this.deepY);
    for (let i = 0; i < 3; i++) {
      const circle = this.add.graphics();
      const obj = { r: 4, alpha: 0.6 };
      this.tweens.add({
        targets: obj,
        r: { from: 4, to: 40 },
        alpha: { from: 0.6, to: 0 },
        duration: 1500,
        delay: i * 200,
        onUpdate: () => {
          circle.clear();
          circle.lineStyle(1, PAL.shimmer, obj.alpha);
          circle.strokeCircle(poolCenter.x, poolCenter.y, obj.r);
        },
        onComplete: () => circle.destroy()
      });
    }
  }

  // ── Iteration 5: Fireflies above surface ──
  addFireflies(surfaceY) {
    for (let i = 0; i < 3; i++) {
      const ff = this.add.graphics();
      ff.fillStyle(0xffffcc, 1);
      ff.fillCircle(0, 0, 1.5);

      const sx = 160 + Math.random() * 160;
      const sy = surfaceY - 20 + Math.random() * 30;
      ff.setPosition(sx, sy);

      // Gentle float
      this.tweens.add({
        targets: ff,
        x: sx + (Math.random() - 0.5) * 40,
        y: sy + (Math.random() - 0.5) * 20,
        duration: 3000 + Math.random() * 2000,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
      });

      // Alpha pulse
      this.tweens.add({
        targets: ff,
        alpha: { from: 0.15, to: 0.7 },
        duration: 1500 + Math.random() * 1000,
        delay: i * 500,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
      });
    }
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0e0e12',
  scene: NegishimuraScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    max: { width: W, height: H }
  }
});
</script>
<div id="oracle-inbox">
  <input id="oracle-input" type="text" placeholder="Send instruction to the Oracle..." maxlength="300" autocomplete="off" />
  <button id="oracle-send">⚡ Send</button>
</div>
<script>
(function() {
  var input = document.getElementById("oracle-input");
  var btn   = document.getElementById("oracle-send");
  if (!input || !btn) return;
  var send = function() {
    var msg = input.value.trim();
    if (!msg) return;
    input.value = "";
    fetch("https://api.kurokimachi.com/inbox", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: msg, from: "ui" })
    }).catch(function(){});
  };
  input.addEventListener("keydown", function(e) { if (e.key === "Enter") send(); });
  btn.addEventListener("click", send);
})();
</script>
</body>
