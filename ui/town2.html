<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>根岸村 · Negishimura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0e12; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const TILE_W = 48, TILE_H = 24;
const COLS = 7, ROWS = 5;
const W = 480, H = 640;

const PAL = {
  grass1: 0x5a8a3c, grass2: 0x6a9a4a, path: 0x8a7a60,
  blossom: 0xf0b0c0, roofBrown: 0x8b6914, houseWall: 0xd4a870,
  earth1: 0x5c3a1e, earth2: 0x7a4e2a, crop: 0x3a7a30,
  cropYellow: 0x8a9a20, rootVeg: 0xe06020,
  stone: 0x2a3040, water: 0x2a5880, shimmer: 0x4a8ab0,
  lantern: 0xf0a030,
  wallDark: 0x4a2e0e, wallLight: 0x6b4226,
  wallStone: 0x1a1e2a, wallCrack: 0x2a2e3a,
};

const originX = W / 2;

function gridToScreen(col, row, floorY) {
  return {
    x: originX + (col - row) * (TILE_W / 2),
    y: floorY + (col + row) * (TILE_H / 2)
  };
}

function drawDiamond(g, cx, cy, color) {
  g.fillStyle(color, 1);
  g.beginPath();
  g.moveTo(cx, cy - TILE_H / 2);
  g.lineTo(cx + TILE_W / 2, cy);
  g.lineTo(cx, cy + TILE_H / 2);
  g.lineTo(cx - TILE_W / 2, cy);
  g.closePath();
  g.fillPath();
}

function drawDiamondOutline(g, cx, cy) {
  g.lineStyle(1, 0x000000, 0.08);
  g.beginPath();
  g.moveTo(cx, cy - TILE_H / 2);
  g.lineTo(cx + TILE_W / 2, cy);
  g.lineTo(cx, cy + TILE_H / 2);
  g.lineTo(cx - TILE_W / 2, cy);
  g.closePath();
  g.strokePath();
}

class NegishimuraScene extends Phaser.Scene {
  create() {
    const g = this.add.graphics();
    const surfaceY = 70;
    const surfaceWallH = 40;
    const farmY = surfaceY + (COLS + ROWS - 1) * (TILE_H / 2) + surfaceWallH + 10;
    const farmWallH = 80;
    const deepY = farmY + (COLS + ROWS - 1) * (TILE_H / 2) + farmWallH + 10;
    const deepWallH = 60;

    // ── Title ──
    this.add.text(W / 2, 24, '根岸村 · Negishimura', {
      fontFamily: 'monospace', fontSize: '14px', color: '#ffffff', align: 'center'
    }).setOrigin(0.5);

    // ── Surface floor ──
    this.drawSurfaceFloor(g, surfaceY);
    this.drawWall(g, surfaceY, surfaceWallH, 'surface');

    // ── Farm floor ──
    this.drawFarmFloor(g, farmY);
    this.drawWall(g, farmY, farmWallH, 'farm');

    // ── Deep floor ──
    this.drawDeepFloor(g, deepY);
    this.drawWall(g, deepY, deepWallH, 'deep');

    // ── Animations ──
    this.addWaterPulse(deepY);
    this.addPetalDrift(surfaceY);
    this.addLanternFlicker(farmY);
  }

  drawSurfaceFloor(g, fy) {
    const stream = [[3,0],[3,1],[3,2]];
    const house = [[4,1],[5,1],[4,2],[5,2]];
    const isStream = (c,r) => stream.some(s => s[0]===c && s[1]===r);
    const isHouse = (c,r) => house.some(s => s[0]===c && s[1]===r);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = gridToScreen(c, r, fy);
        if (isStream(c, r)) {
          drawDiamond(g, p.x, p.y, PAL.water);
        } else if (isHouse(c, r)) {
          drawDiamond(g, p.x, p.y, PAL.path);
        } else {
          drawDiamond(g, p.x, p.y, (c + r) % 2 === 0 ? PAL.grass1 : PAL.grass2);
        }
        drawDiamondOutline(g, p.x, p.y);
      }
    }

    // House
    const hp = gridToScreen(4.5, 1.5, fy);
    // front wall
    g.fillStyle(PAL.houseWall, 1);
    g.fillRect(hp.x - 18, hp.y - 26, 36, 20);
    // side wall (darker)
    g.fillStyle(0xb89060, 1);
    g.beginPath();
    g.moveTo(hp.x + 18, hp.y - 26);
    g.lineTo(hp.x + 30, hp.y - 20);
    g.lineTo(hp.x + 30, hp.y);
    g.lineTo(hp.x + 18, hp.y - 6);
    g.closePath();
    g.fillPath();
    // roof
    g.fillStyle(PAL.roofBrown, 1);
    g.beginPath();
    g.moveTo(hp.x, hp.y - 40);
    g.lineTo(hp.x + 24, hp.y - 26);
    g.lineTo(hp.x + 34, hp.y - 20);
    g.lineTo(hp.x + 10, hp.y - 6);
    g.lineTo(hp.x - 22, hp.y - 20);
    g.lineTo(hp.x - 22, hp.y - 26);
    g.closePath();
    g.fillPath();

    // Cherry blossom trees
    this.drawTree(g, gridToScreen(1, 1, fy));
    this.drawTree(g, gridToScreen(6, 3, fy));

    // Fallen petals on nearby tiles
    const petalTiles = [[0,1],[1,0],[2,1],[1,2],[5,3],[6,2],[5,4]];
    for (const [c, r] of petalTiles) {
      if (c < COLS && r < ROWS) {
        const p = gridToScreen(c, r, fy);
        for (let i = 0; i < 3; i++) {
          g.fillStyle(PAL.blossom, 0.7);
          g.fillCircle(p.x + (Math.random()-0.5)*20, p.y + (Math.random()-0.5)*8, 1.5);
        }
      }
    }
  }

  drawTree(g, pos) {
    // trunk
    g.fillStyle(0x6b4226, 1);
    g.fillRect(pos.x - 2, pos.y - 30, 4, 22);
    // blossoms (cluster of pink ellipses)
    const blossomOffsets = [[0,-36],[6,-33],[-6,-33],[0,-28],[8,-28],[-8,-28],[3,-40],[-3,-40]];
    for (const [ox, oy] of blossomOffsets) {
      g.fillStyle(PAL.blossom, 0.85);
      g.fillEllipse(pos.x + ox, pos.y + oy, 10, 7);
    }
    g.fillStyle(0xffc0d0, 0.6);
    g.fillEllipse(pos.x, pos.y - 34, 6, 5);
  }

  drawFarmFloor(g, fy) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = gridToScreen(c, r, fy);
        const isPath = c === 3;
        if (isPath) {
          drawDiamond(g, p.x, p.y, PAL.path);
        } else {
          drawDiamond(g, p.x, p.y, (c + r) % 2 === 0 ? PAL.earth1 : PAL.earth2);
        }
        drawDiamondOutline(g, p.x, p.y);

        // Crops
        if (!isPath && r < 4) {
          const cropColors = [PAL.crop, PAL.cropYellow, PAL.crop, PAL.rootVeg];
          const color = cropColors[r];
          if (r === 3) {
            // root vegetables - small dots
            for (let i = 0; i < 3; i++) {
              g.fillStyle(color, 0.9);
              g.fillCircle(p.x + (i-1)*8, p.y, 2.5);
            }
          } else {
            // leafy crops - small rects
            for (let i = 0; i < 4; i++) {
              g.fillStyle(color, 0.9);
              g.fillRect(p.x - 10 + i * 6, p.y - 3, 3, 6);
            }
          }
        }
      }
    }

    // Lantern at [3,2]
    const lp = gridToScreen(3, 2, fy);
    g.fillStyle(0x6b4226, 1);
    g.fillRect(lp.x - 1, lp.y - 14, 2, 10);
    g.fillStyle(PAL.lantern, 1);
    g.fillRect(lp.x - 4, lp.y - 18, 8, 6);
    // glow
    g.fillStyle(PAL.lantern, 0.08);
    g.fillCircle(lp.x, lp.y, 40);
    g.fillStyle(PAL.lantern, 0.05);
    g.fillCircle(lp.x, lp.y, 60);
  }

  drawDeepFloor(g, fy) {
    const poolTiles = [];
    for (let c = 1; c <= 5; c++) for (let r = 1; r <= 3; r++) poolTiles.push([c,r]);
    const isPool = (c,r) => poolTiles.some(p => p[0]===c && p[1]===r);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = gridToScreen(c, r, fy);
        if (isPool(c, r)) {
          drawDiamond(g, p.x, p.y, PAL.water);
        } else {
          drawDiamond(g, p.x, p.y, PAL.stone);
          // stone rim around pool
          const adjPool = isPool(c-1,r)||isPool(c+1,r)||isPool(c,r-1)||isPool(c,r+1);
          if (adjPool) {
            drawDiamond(g, p.x, p.y, 0x3a4050);
          }
        }
        drawDiamondOutline(g, p.x, p.y);
      }
    }

    // Koi fish
    const koi = gridToScreen(3, 2, fy);
    g.fillStyle(0xe06020, 0.9);
    g.fillEllipse(koi.x + 4, koi.y - 1, 10, 5);
    g.fillStyle(0xf0f0f0, 0.8);
    g.fillEllipse(koi.x + 9, koi.y - 1, 4, 3);
  }

  drawWall(g, fy, wallH, type) {
    // Compute the bottom edge of the floor's isometric grid
    // Left corner: gridToScreen(0, ROWS-1)
    // Right corner: gridToScreen(COLS-1, 0)
    // Bottom corner: gridToScreen(COLS-1, ROWS-1)
    const left = gridToScreen(0, ROWS - 1, fy);
    const bottom = gridToScreen(COLS - 1, ROWS - 1, fy);
    const right = gridToScreen(COLS - 1, 0, fy);

    // Draw wall as a parallelogram under the bottom-left edge and bottom-right edge
    // Left wall face (under left→bottom edge)
    if (type === 'surface') {
      g.fillStyle(PAL.wallDark, 1);
    } else if (type === 'farm') {
      g.fillStyle(PAL.wallDark, 1);
    } else {
      g.fillStyle(PAL.wallStone, 1);
    }

    // Left face
    g.beginPath();
    g.moveTo(left.x, left.y + TILE_H / 2);
    g.lineTo(bottom.x, bottom.y + TILE_H / 2);
    g.lineTo(bottom.x, bottom.y + TILE_H / 2 + wallH);
    g.lineTo(left.x, left.y + TILE_H / 2 + wallH);
    g.closePath();
    g.fillPath();

    // Right face (slightly lighter)
    const rightColor = type === 'deep' ? 0x222838 : PAL.wallLight;
    g.fillStyle(rightColor, 1);
    g.beginPath();
    g.moveTo(bottom.x, bottom.y + TILE_H / 2);
    g.lineTo(right.x, right.y + TILE_H / 2);
    g.lineTo(right.x, right.y + TILE_H / 2 + wallH);
    g.lineTo(bottom.x, bottom.y + TILE_H / 2 + wallH);
    g.closePath();
    g.fillPath();

    // Detail lines
    if (type === 'farm') {
      // Root lines
      g.lineStyle(1, 0x3a7a30, 0.3);
      for (let i = 0; i < 5; i++) {
        const yOff = 15 + i * 14;
        const lx = left.x + 10 + i * 20;
        g.beginPath();
        g.moveTo(lx, left.y + TILE_H / 2 + yOff);
        g.lineTo(lx + 8, left.y + TILE_H / 2 + yOff + 10);
        g.lineTo(lx + 3, left.y + TILE_H / 2 + yOff + 18);
        g.strokePath();
      }
    } else if (type === 'deep') {
      // Crack lines
      g.lineStyle(1, PAL.wallCrack, 0.5);
      for (let i = 0; i < 3; i++) {
        const yOff = 12 + i * 18;
        g.beginPath();
        g.moveTo(left.x + 20, left.y + TILE_H / 2 + yOff);
        g.lineTo(left.x + 80, left.y + TILE_H / 2 + yOff);
        g.strokePath();
      }
    } else {
      // Surface: grass/topsoil stripe
      g.fillStyle(PAL.grass1, 0.3);
      g.beginPath();
      g.moveTo(left.x, left.y + TILE_H / 2);
      g.lineTo(bottom.x, bottom.y + TILE_H / 2);
      g.lineTo(bottom.x, bottom.y + TILE_H / 2 + 8);
      g.lineTo(left.x, left.y + TILE_H / 2 + 8);
      g.closePath();
      g.fillPath();
    }
  }

  addWaterPulse(deepY) {
    const glow = this.add.graphics();
    const poolCenter = gridToScreen(3, 2, deepY);
    glow.fillStyle(PAL.shimmer, 0.15);
    glow.fillEllipse(poolCenter.x, poolCenter.y, 80, 30);

    this.tweens.add({
      targets: glow,
      alpha: { from: 0.4, to: 1 },
      duration: 3000,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });
  }

  addPetalDrift(surfaceY) {
    for (let i = 0; i < 6; i++) {
      const petal = this.add.graphics();
      petal.fillStyle(PAL.blossom, 0.8);
      petal.fillEllipse(0, 0, 3, 2);

      const startX = 160 + Math.random() * 160;
      const startY = surfaceY + Math.random() * 40;
      petal.setPosition(startX, startY);

      this.tweens.add({
        targets: petal,
        x: startX + 30 + Math.random() * 40,
        y: startY + 60 + Math.random() * 40,
        alpha: { from: 0.9, to: 0 },
        duration: 4000 + Math.random() * 3000,
        delay: i * 800,
        repeat: -1,
        onRepeat: () => {
          petal.setPosition(160 + Math.random() * 160, surfaceY + Math.random() * 20);
        }
      });
    }
  }

  addLanternFlicker(farmY) {
    const glow = this.add.graphics();
    const lp = gridToScreen(3, 2, farmY);
    glow.fillStyle(PAL.lantern, 0.12);
    glow.fillCircle(lp.x, lp.y, 50);

    this.tweens.add({
      targets: glow,
      alpha: { from: 0.8, to: 1 },
      duration: 800,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0e0e12',
  scene: NegishimuraScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    max: { width: W, height: H }
  }
});
</script>
</body>
</html>
