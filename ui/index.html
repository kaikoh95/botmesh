  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('[GLOBAL ERROR]', msg, src + ':' + line, err);
    };
    window.onunhandledrejection = function(e) {
      console.error('[UNHANDLED PROMISE]', e.reason);
    };

    // ── Loading screen dismiss ──────────────────────────────────────────────
    window.__dismissLoadingScreen = function() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function() { el.remove(); }, 900);
      }
    };
    // Auto-dismiss after 5s regardless — don't block on API connectivity
    setTimeout(window.__dismissLoadingScreen, 5000);

    // ── Sidebar drawer ──────────────────────────────────────────────────────
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    const menuToggle = document.getElementById('menu-toggle');
    const closeBtn = document.getElementById('sidebar-close');

    function openSidebar() {
      sidebar.classList.add('open');
      backdrop.classList.add('visible');
      menuToggle.style.opacity = '0';
      menuToggle.style.pointerEvents = 'none';
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      backdrop.classList.remove('visible');
      menuToggle.style.opacity = '1';
      menuToggle.style.pointerEvents = 'auto';
    }

    menuToggle.addEventListener('click', openSidebar);
    closeBtn.addEventListener('click', closeSidebar);
    backdrop.addEventListener('click', closeSidebar);

    // ── Roadmap button ──────────────────────────────────────────────────────
    // Wired after main.js module loads — use event delegation on DOMContentLoaded
    document.getElementById('roadmap-btn').addEventListener('click', () => {
      // RoadmapPanel is defined in the ES module (main.js); access via window proxy
      if (window.__RoadmapPanel) window.__RoadmapPanel.show();
    });

    // ── Accordion ───────────────────────────────────────────────────────────
    document.querySelectorAll('.accordion-header').forEach(btn => {
      btn.addEventListener('click', () => {
        const bodyId = btn.dataset.target;
        const body = document.getElementById(bodyId);
        const chevron = btn.querySelector('.acc-chevron');
        const isCollapsed = body.classList.toggle('collapsed');
        chevron.textContent = isCollapsed ? '▸' : '▾';
      });
    });
  </script>

<script>
(function() {
  var input = document.getElementById("oracle-input");
  var btn   = document.getElementById("oracle-send");
  if (!input || !btn) return;
  var send = function() {
    var msg = input.value.trim();
    if (!msg) return;
    input.value = "";
    fetch("https://api.kurokimachi.com/inbox", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: msg, from: "ui" })
    }).catch(function(){});
  };
  input.addEventListener("keydown", function(e) { if (e.key === "Enter") send(); });
  btn.addEventListener("click", send);
})();
</script>
<script>
(function() {
  var input = document.getElementById('oracle-input');
  var micBtn = document.getElementById('oracle-mic');
  var sendBtn = document.getElementById('oracle-send');

  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition || !micBtn) {
    if (micBtn) micBtn.classList.add('unsupported');
    return;
  }

  var recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  var listening = false;
  var originalPlaceholder = input.placeholder;

  micBtn.addEventListener('click', function() {
    if (listening) {
      recognition.stop();
      return;
    }
    input.value = '';
    input.placeholder = 'Listening...';
    micBtn.classList.add('listening');
    listening = true;
    recognition.start();
  });

  recognition.onresult = function(event) {
    var transcript = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    input.value = transcript;

    if (event.results[event.results.length - 1].isFinal) {
      setTimeout(function() {
        if (input.value.trim()) {
          sendBtn.click();
        }
      }, 800);
    }
  };

  recognition.onerror = function(event) {
    console.warn('[Voice] error:', event.error);
    resetMic();
    if (event.error === 'not-allowed') {
      input.placeholder = 'Mic permission denied';
      setTimeout(function() { input.placeholder = originalPlaceholder; }, 3000);
    }
  };

  recognition.onend = function() {
    resetMic();
  };

  function resetMic() {
    listening = false;
    micBtn.classList.remove('listening');
    input.placeholder = originalPlaceholder;
  }

  // Stop recognition if user starts typing
  input.addEventListener('focus', function() {
    if (listening) recognition.stop();
  });
})();
</script>
<script>
(function() {
  var btn = document.getElementById('bulletin-btn');
  var panel = document.getElementById('bulletin-panel');
  var closeBtn = document.getElementById('bulletin-close');
  var body = document.getElementById('bulletin-body');

  btn.addEventListener('click', function() {
    body.innerHTML = '<div class="b-section" style="padding:20px 16px;color:#c9a84c">Loading town data…</div>';
    panel.classList.remove('bulletin-hidden');
    fetch('https://api.kurokimachi.com/state')
      .then(function(r) { return r.json(); })
      .then(function(state) { body.innerHTML = renderBulletin(state); })
      .catch(function() { body.innerHTML = '<div class="b-section" style="padding:20px 16px;color:#c9a84c">Could not load town data.</div>'; });
  });

  closeBtn.addEventListener('click', function() { panel.classList.add('bulletin-hidden'); });
  panel.addEventListener('click', function(e) { if (e.target === panel) panel.classList.add('bulletin-hidden'); });

  function renderBulletin(state) {
    var buildings = state.buildings || {};
    var agents = state.agents || {};
    var gazette = state.gazette || [];

    // Headlines from gazette (last 48h)
    var cutoff = Date.now() - 48 * 60 * 60 * 1000;
    var headlines = gazette
      .filter(function(g) { return (g.ts && g.ts > cutoff) || (g.timestamp && new Date(g.timestamp).getTime() > cutoff); })
      .slice(0, 5);

    var headlineHTML = headlines.length > 0
      ? headlines.map(function(h) { return '<div class="b-item">' + escHtml(h.text || h.message || JSON.stringify(h)) + '</div>'; }).join('')
      : '<div class="b-item dim">No recent headlines</div>';

    // Agent activity
    var agentList = Object.keys(agents).map(function(k) { return [k, agents[k]]; });
    var activeAgents = agentList.filter(function(pair) { return pair[1].online !== false; });
    var sleepingCount = agentList.filter(function(pair) { return pair[1].state === 'sleeping'; }).length;

    var agentHTML = activeAgents.slice(0, 8).map(function(pair) {
      var id = pair[0], a = pair[1];
      var emoji = a.emoji || '🤖';
      var name = a.name || id;
      var activity = a.state || a.activity || 'idle';
      return '<div class="b-item">' + emoji + ' ' + escHtml(name) + ' — ' + escHtml(activity) + '</div>';
    }).join('');
    if (sleepingCount > 0) agentHTML += '<div class="b-item dim">(' + sleepingCount + ' agents sleeping)</div>';
    if (agentHTML === '') agentHTML = '<div class="b-item dim">No agents online</div>';

    // Town stats
    var buildingKeys = Object.keys(buildings);
    var highest = buildingKeys.reduce(function(max, k) {
      var b = buildings[k];
      return (b.level || 1) > (max.level || 1) ? { name: b.name || k, level: b.level || 1 } : max;
    }, { name: 'none', level: 0 });

    // World flavor
    var hour = new Date().getHours();
    var flavor = [];
    if (hour >= 22 || hour < 6) flavor.push('🌙 Stars visible over the village');
    else if (hour < 10) flavor.push('☀️ Morning light warms the rooftops');
    else if (hour < 17) flavor.push('🏮 Afternoon bustle in the streets');
    else flavor.push('🌅 Evening lanterns glow along the paths');
    flavor.push('❄️ Light snow dusting the rooftops');

    var today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    return '<div class="b-date">🗓 ' + today + '</div>' +
      '<div class="b-section"><h3>📰 Headlines</h3>' + headlineHTML + '</div>' +
      '<div class="b-section"><h3>🏯 Agent Activity</h3>' + agentHTML + '</div>' +
      '<div class="b-section"><h3>🌏 World Events</h3>' + flavor.map(function(f) { return '<div class="b-item">' + f + '</div>'; }).join('') + '</div>' +
      '<div class="b-section"><h3>📊 Town Stats</h3>' +
        '<div class="b-item">Buildings: ' + buildingKeys.length + ' | Citizens: ' + agentList.length + '</div>' +
        '<div class="b-item">Highest: ' + escHtml(highest.name) + ' (L' + highest.level + ')</div>' +
      '</div>';
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
