<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神託の間 · The Oracle Chamber</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050810; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; padding-bottom: 42px; }
    #oracle-inbox {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 6px; padding: 8px 24px 10px;
      background: linear-gradient(180deg, #0c101e 0%, #080c16 100%);
      border-top: 2px solid #1a1408;
      box-shadow: 0 -4px 20px rgba(240,160,48,0.04), inset 0 1px 0 rgba(240,160,48,0.06);
      z-index: 9999;
    }
    #oracle-inbox::before {
      content: '奉'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: #3a2a10; opacity: 0.5; font-family: serif;
    }
    #oracle-inbox input {
      flex: 1; background: #0a0e18; border: 1px solid #2a2010;
      color: #e0d8c8; font-family: monospace; font-size: 13px;
      padding: 8px 14px; outline: none; border-radius: 1px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #oracle-inbox input::placeholder { color: #4a3a20; font-style: italic; }
    #oracle-inbox input:focus {
      border-color: #c08020;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.4), 0 0 8px rgba(240,160,48,0.12);
    }
    #oracle-inbox button {
      background: linear-gradient(180deg, #d09030 0%, #a06820 100%);
      color: #0a0e1a; border: 1px solid #8a5a10; font-size: 13px;
      padding: 6px 16px; cursor: pointer; font-family: monospace;
      border-radius: 1px; font-weight: bold; letter-spacing: 1px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: background 0.2s, box-shadow 0.2s;
    }
    #oracle-inbox button:hover {
      background: linear-gradient(180deg, #e0a040 0%, #c08030 100%);
      box-shadow: 0 1px 8px rgba(240,160,48,0.25);
    }
    canvas { display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="oracle-inbox">
  <input id="oracle-input" type="text" placeholder="Send instruction to the Oracle..." maxlength="300" autocomplete="off" />
  <button id="oracle-send">⚡ Send</button>
</div>
<script>
const W = 620, H = 830;

const AGENTS = [
  { id: 'scarlet',  emoji: '🔴', name: 'Scarlet' },
  { id: 'forge',    emoji: '⚙️',  name: 'Forge' },
  { id: 'lumen',    emoji: '🔬', name: 'Lumen' },
  { id: 'sage',     emoji: '📖', name: 'Sage' },
  { id: 'iron',     emoji: '⚔️',  name: 'Iron' },
  { id: 'cronos',   emoji: '⏰', name: 'Cronos' },
  { id: 'mosaic',   emoji: '🎨', name: 'Mosaic' },
  { id: 'echo',     emoji: '🔊', name: 'Echo' },
  { id: 'canvas',   emoji: '🖼️',  name: 'Canvas' },
  { id: 'patch',    emoji: '🔧', name: 'Patch' },
  { id: 'muse',     emoji: '🎭', name: 'Muse' },
  { id: 'planner',  emoji: '🗺️',  name: 'Planner' },
];

const PAL = {
  bg: 0x050810,
  steleBase: 0x1a1e2a,
  steleFace: 0x252a3a,
  steleEdge: 0x0e1018,
  steleTop: 0x2a3040,
  amberGlow: 0xf0a030,
  amberBright: 0xffc844,
  warmGlow: 0x8a6020,
  coldGlow: 0x2a3448,
  offlineGrey: 0x1a1e28,
  inkDark: 0x1a0e04,
  inkAmber: 0xd09030,
  snow: 0xd0d8e8,
  incense: 0x4a4860,
  brazierOrange: 0xe06020,
  brazierDark: 0x3a1a08,
  floorStone: 0x0a0e18,
  floorLine: 0x101420,
  wallStone: 0x10141e,
  wallLine: 0x181c28,
  windowFrame: 0x2a2018,
  windowNight: 0x0a1428,
};

// Stele grid: 4 columns × 3 rows
const STELE_COLS = 4, STELE_ROWS = 3;
const STELE_W = 100, STELE_H = 130;
const GRID_X = 50, GRID_Y = 120;
const GAP_X = 30, GAP_Y = 20;

function stelePos(col, row) {
  return {
    x: GRID_X + col * (STELE_W + GAP_X),
    y: GRID_Y + row * (STELE_H + GAP_Y)
  };
}

class OracleChamberScene extends Phaser.Scene {
  constructor() { super('OracleChamberScene'); }

  create() {
    this.agentStates = {};
    this.steleObjects = {};
    this.recentMessages = [];

    AGENTS.forEach(a => {
      this.agentStates[a.id] = { online: false, lastSpoke: 0, lastMessage: '' };
    });

    // Iter 7: Room atmosphere — walls, floor, window
    this.drawRoom();
    // Iter 1+2: Stele grid with candle glows
    this.drawSteles();
    // Iter 5: Central brazier with incense smoke
    this.drawBrazier();
    // Iter 7: Snow window
    this.drawSnowWindow();
    // Iter 8: Agent emoji icons rendered on steles
    this.drawEmojiLabels();
    // Iter 9: Last spoke ticker
    this.drawTicker();
    // Iter 10: Title
    this.drawTitle();

    // Inbox input bar
    this.drawInbox();

    // Animations
    this.addCandleFlicker();    // Iter 2
    this.addBrazierFlicker();   // Brazier ember pulse
    this.addIncenseSmoke();     // Iter 5
    this.addSnowfall();         // Iter 7
    this.addAmbientParticles(); // Iter 10: dust motes

    // SSE — Iter 3, 4, 6
    this.connectSSE();
  }

  // ── Iter 7: Room walls, floor, ambient ──
  drawRoom() {
    const g = this.add.graphics();

    // Floor — dark stone tiles
    g.fillStyle(PAL.floorStone, 1);
    g.fillRect(0, 0, W, H);

    // Floor tile grid
    const tileSize = 32;
    g.lineStyle(1, PAL.floorLine, 0.3);
    for (let y = 0; y < H; y += tileSize) {
      g.lineBetween(0, y, W, y);
    }
    for (let x = 0; x < W; x += tileSize) {
      g.lineBetween(x, 0, x, H);
    }

    // Wall texture bands along top
    g.fillStyle(PAL.wallStone, 1);
    g.fillRect(0, 0, W, 80);
    for (let i = 0; i < 6; i++) {
      g.fillStyle(PAL.wallLine, 0.3 + i * 0.05);
      g.fillRect(0, 10 + i * 12, W, 1);
    }

    // Subtle wall-to-floor gradient
    g.fillStyle(0x080c16, 0.5);
    g.fillRect(0, 70, W, 30);

    // Stone crack details on floor
    g.lineStyle(1, 0x080c14, 0.6);
    const cracks = [
      [[80,200],[95,240],[88,280]], [[400,300],[420,340],[410,380]],
      [[200,500],[220,530],[215,570]], [[500,150],[510,190],[520,220]],
      [[150,650],[170,680],[160,710]], [[450,550],[470,580],[465,620]],
    ];
    cracks.forEach(pts => {
      g.beginPath();
      g.moveTo(pts[0][0], pts[0][1]);
      pts.slice(1).forEach(p => g.lineTo(p[0], p[1]));
      g.strokePath();
    });

    // Subtle light pools from candles (warm spots on floor)
    const lgp = this.add.graphics();
    lgp.fillStyle(0xf0a030, 0.015);
    for (let row = 0; row < STELE_ROWS; row++) {
      for (let col = 0; col < STELE_COLS; col++) {
        const idx = row * STELE_COLS + col;
        if (idx >= AGENTS.length) break;
        const pos = stelePos(col, row);
        lgp.fillCircle(pos.x + STELE_W / 2, pos.y + STELE_H + 20, 40);
      }
    }

    // Radial vignette — layered ellipses from edges
    const vig = this.add.graphics();
    vig.fillStyle(0x020408, 0.5);
    vig.fillRect(0, 0, 40, H);
    vig.fillStyle(0x020408, 0.5);
    vig.fillRect(W - 40, 0, 40, H);
    vig.fillStyle(0x020408, 0.35);
    vig.fillRect(0, H - 60, W, 60);
    // Soft gradient bands along edges
    for (let i = 0; i < 5; i++) {
      vig.fillStyle(0x020408, 0.12 - i * 0.02);
      vig.fillRect(40 + i * 10, 0, 10, H);
      vig.fillRect(W - 50 - i * 10, 0, 10, H);
    }
    // Top darkness for depth
    vig.fillStyle(0x020408, 0.25);
    vig.fillRect(0, 0, W, 90);
  }

  // ── Iter 1: Basic stele grid + Iter 2: candle slots ──
  drawSteles() {
    for (let row = 0; row < STELE_ROWS; row++) {
      for (let col = 0; col < STELE_COLS; col++) {
        const idx = row * STELE_COLS + col;
        if (idx >= AGENTS.length) break;
        const agent = AGENTS[idx];
        const pos = stelePos(col, row);
        this.drawSingleStele(agent, pos);
      }
    }
  }

  drawSingleStele(agent, pos) {
    const g = this.add.graphics();
    const cx = pos.x + STELE_W / 2;
    const cy = pos.y + STELE_H / 2;

    // Shadow beneath stele
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(cx, pos.y + STELE_H + 4, STELE_W * 0.7, 8);

    // Stele body — tapered stone rectangle
    const bx = pos.x + 10, by = pos.y + 10;
    const bw = STELE_W - 20, bh = STELE_H - 15;

    // Left face (darker)
    g.fillStyle(PAL.steleEdge, 1);
    g.beginPath();
    g.moveTo(bx, by + 4);
    g.lineTo(bx + 4, by);
    g.lineTo(bx + 4, by + bh);
    g.lineTo(bx, by + bh);
    g.closePath();
    g.fillPath();

    // Main face
    g.fillStyle(PAL.steleFace, 1);
    g.fillRect(bx + 4, by, bw - 8, bh);

    // Right face (darker)
    g.fillStyle(PAL.steleEdge, 1);
    g.beginPath();
    g.moveTo(bx + bw, by + 4);
    g.lineTo(bx + bw - 4, by);
    g.lineTo(bx + bw - 4, by + bh);
    g.lineTo(bx + bw, by + bh);
    g.closePath();
    g.fillPath();

    // Top face (lighter)
    g.fillStyle(PAL.steleTop, 1);
    g.beginPath();
    g.moveTo(bx, by + 4);
    g.lineTo(bx + 4, by);
    g.lineTo(bx + bw - 4, by);
    g.lineTo(bx + bw, by + 4);
    g.closePath();
    g.fillPath();

    // Engraved border lines — double border for carved look
    g.lineStyle(1, 0x3a4050, 0.35);
    g.strokeRect(bx + 8, by + 4, bw - 16, bh - 8);
    g.lineStyle(1, 0x1a2030, 0.25);
    g.strokeRect(bx + 10, by + 6, bw - 20, bh - 12);

    // Rune engravings — small decorative marks
    const runeAlpha = 0.15;
    g.lineStyle(1, 0x4a5a70, runeAlpha);
    // Top rune bar
    const runeY = by + 22;
    g.lineBetween(bx + 14, runeY, bx + bw - 14, runeY);
    // Side rune ticks
    for (let r = 0; r < 3; r++) {
      const ry = by + 28 + r * 14;
      g.lineBetween(bx + 12, ry, bx + 16, ry);
      g.lineBetween(bx + bw - 16, ry, bx + bw - 12, ry);
    }
    // Bottom rune bar
    g.lineBetween(bx + 14, by + bh - 14, bx + bw - 14, by + bh - 14);

    // Corner rune symbols (tiny L shapes)
    g.lineStyle(1, 0x4a5a70, runeAlpha * 0.8);
    [[bx+12,by+8,bx+18,by+8,bx+12,by+14], [bx+bw-12,by+8,bx+bw-18,by+8,bx+bw-12,by+14],
     [bx+12,by+bh-8,bx+18,by+bh-8,bx+12,by+bh-14], [bx+bw-12,by+bh-8,bx+bw-18,by+bh-8,bx+bw-12,by+bh-14]
    ].forEach(([x1,y1,x2,y2,x3,y3]) => {
      g.lineBetween(x1,y1,x2,y2);
      g.lineBetween(x1,y1,x3,y3);
    });

    // Base pedestal — wider, more substantial
    g.fillStyle(0x12161e, 1);
    g.fillRect(pos.x + 4, pos.y + STELE_H - 6, STELE_W - 8, 12);
    g.fillStyle(PAL.steleBase, 1);
    g.fillRect(pos.x + 6, pos.y + STELE_H - 8, STELE_W - 12, 10);
    g.lineStyle(1, 0x2a3040, 0.3);
    g.strokeRect(pos.x + 6, pos.y + STELE_H - 8, STELE_W - 12, 10);

    // Agent name
    const nameText = this.add.text(cx, pos.y + STELE_H - 12, agent.name.toLowerCase(), {
      fontFamily: 'monospace', fontSize: '10px', color: '#5a6a7a', align: 'center'
    }).setOrigin(0.5);

    // Status dot (online/offline) — larger, more visible
    const statusDot = this.add.graphics();
    statusDot.fillStyle(PAL.coldGlow, 0.5);
    statusDot.fillCircle(cx, pos.y + STELE_H + 4, 4);
    // Outer ring for offline state
    const statusRing = this.add.graphics();
    statusRing.lineStyle(1, PAL.coldGlow, 0.3);
    statusRing.strokeCircle(cx, pos.y + STELE_H + 4, 6);

    // Iter 2: Candle on top of stele
    const candleG = this.add.graphics();
    this.drawCandle(candleG, cx, by - 2);

    // Glow overlay for active pulse (Iter 3)
    const glowG = this.add.graphics();
    glowG.setAlpha(0);

    // Ink text area (Iter 4) — message text object
    const inkText = this.add.text(cx, by + 30, '', {
      fontFamily: 'monospace', fontSize: '8px', color: '#d09030',
      align: 'center', wordWrap: { width: bw - 20 }, lineSpacing: 2
    }).setOrigin(0.5, 0).setAlpha(0);

    this.steleObjects[agent.id] = {
      g, glowG, candleG, statusDot, statusRing, nameText, inkText,
      pos, cx, cy, bx, by, bw, bh
    };
  }

  drawCandle(g, cx, baseY) {
    // Candle stick
    g.fillStyle(0x8a7a60, 1);
    g.fillRect(cx - 2, baseY - 8, 4, 8);
    // Wax drip
    g.fillStyle(0x9a8a70, 0.7);
    g.fillRect(cx - 3, baseY - 2, 6, 3);
    // Flame core
    g.fillStyle(PAL.amberBright, 0.9);
    g.fillEllipse(cx, baseY - 12, 3, 5);
    // Flame outer
    g.fillStyle(PAL.amberGlow, 0.5);
    g.fillEllipse(cx, baseY - 13, 5, 7);
    // Tiny glow halo
    g.fillStyle(PAL.amberGlow, 0.06);
    g.fillCircle(cx, baseY - 10, 18);
  }

  // ── Iter 5: Central brazier ──
  drawBrazier() {
    const g = this.add.graphics();
    const bx = W / 2, by = GRID_Y + 1.5 * (STELE_H + GAP_Y) - 10;

    // Brazier bowl
    g.fillStyle(PAL.brazierDark, 1);
    g.fillEllipse(bx, by + 5, 40, 12);
    g.fillStyle(0x2a1208, 1);
    g.fillRect(bx - 18, by - 2, 36, 10);
    g.fillStyle(0x4a2a10, 1);
    g.fillEllipse(bx, by - 2, 36, 10);

    // Ember bed inside brazier
    g.fillStyle(0x8a2a08, 0.6);
    g.fillEllipse(bx, by - 2, 28, 7);
    g.fillStyle(PAL.brazierOrange, 0.45);
    g.fillEllipse(bx, by - 2, 20, 5);
    g.fillStyle(PAL.amberBright, 0.3);
    g.fillEllipse(bx, by - 3, 10, 3);
    // Ambient glow on surrounding floor
    g.fillStyle(PAL.amberBright, 0.04);
    g.fillCircle(bx, by, 80);
    g.fillStyle(PAL.brazierOrange, 0.06);
    g.fillCircle(bx, by, 50);

    // Legs
    g.fillStyle(0x2a1a0a, 1);
    g.fillRect(bx - 16, by + 10, 4, 12);
    g.fillRect(bx + 12, by + 10, 4, 12);
    g.fillRect(bx - 2, by + 10, 4, 14);

    this.brazierPos = { x: bx, y: by };
  }

  // ── Iter 7: Snow window at top ──
  drawSnowWindow() {
    const g = this.add.graphics();
    const wx = W / 2, wy = 40;
    const ww = 80, wh = 40;

    // Window frame
    g.fillStyle(PAL.windowFrame, 1);
    g.fillRect(wx - ww / 2 - 4, wy - wh / 2 - 4, ww + 8, wh + 8);

    // Night sky through window
    g.fillStyle(PAL.windowNight, 1);
    g.fillRect(wx - ww / 2, wy - wh / 2, ww, wh);

    // Crossbars
    g.fillStyle(PAL.windowFrame, 1);
    g.fillRect(wx - 2, wy - wh / 2, 4, wh);
    g.fillRect(wx - ww / 2, wy - 2, ww, 4);

    // Stars in window
    g.fillStyle(0xc0d0e0, 0.6);
    [[wx-15,wy-12],[wx-25,wy-5],[wx+10,wy-14],[wx-8,wy+8],[wx+25,wy+5]].forEach(([sx,sy]) => {
      g.fillCircle(sx, sy, 0.5 + Math.random() * 0.5);
    });

    // Moon glow — layered for depth
    g.fillStyle(0x3050a0, 0.12);
    g.fillCircle(wx + 20, wy - 8, 12);
    g.fillStyle(0x4060a0, 0.2);
    g.fillCircle(wx + 20, wy - 8, 8);
    g.fillStyle(0x8090b0, 0.35);
    g.fillCircle(wx + 20, wy - 8, 4);
    g.fillStyle(0xc0d0e0, 0.4);
    g.fillCircle(wx + 20, wy - 8, 2);

    // Moonlight spill onto floor
    g.fillStyle(0x2040608, 0.0);
    const mlg = this.add.graphics();
    mlg.fillStyle(0x4060a0, 0.03);
    mlg.beginPath();
    mlg.moveTo(wx - ww / 2, wy + wh / 2);
    mlg.lineTo(wx + ww / 2, wy + wh / 2);
    mlg.lineTo(wx + ww / 2 + 30, wy + wh / 2 + 60);
    mlg.lineTo(wx - ww / 2 - 30, wy + wh / 2 + 60);
    mlg.closePath();
    mlg.fillPath();

    this.windowPos = { x: wx, y: wy, w: ww, h: wh };
  }

  // ── Iter 8: Emoji labels on steles ──
  drawEmojiLabels() {
    AGENTS.forEach(agent => {
      const s = this.steleObjects[agent.id];
      if (!s) return;
      this.add.text(s.cx, s.by + 12, agent.emoji, {
        fontSize: '16px', align: 'center'
      }).setOrigin(0.5);
    });
  }

  // ── Iter 9: Last spoke ticker at bottom ──
  drawTicker() {
    const g = this.add.graphics();
    const ty = H - 50;

    // Ticker background bar
    g.fillStyle(0x0a0e18, 0.8);
    g.fillRect(20, ty, W - 40, 30);
    g.lineStyle(1, 0x2a3040, 0.5);
    g.strokeRect(20, ty, W - 40, 30);

    // Label
    this.add.text(30, ty + 3, '最後の神託', {
      fontFamily: 'monospace', fontSize: '8px', color: '#4a5a6a'
    });

    // Message text — typewriter effect target
    this.tickerText = this.add.text(30, ty + 14, '— awaiting oracle messages —', {
      fontFamily: 'monospace', fontSize: '10px', color: '#8a7a60',
      wordWrap: { width: W - 70 }
    });
  }

  // ── Iter 10: Title ──
  drawTitle() {
    // Glow shadow
    this.add.text(W / 2, 14, '神託の間 · The Oracle Chamber', {
      fontFamily: 'monospace', fontSize: '14px', color: '#3a4a60',
      align: 'center',
      shadow: { offsetX: 0, offsetY: 0, color: '#2040608', blur: 10, fill: true }
    }).setOrigin(0.5);
    // Main text
    this.add.text(W / 2, 14, '神託の間 · The Oracle Chamber', {
      fontFamily: 'monospace', fontSize: '14px', color: '#8090a8', align: 'center'
    }).setOrigin(0.5);
  }

  // ── Inbox input bar ──
  drawInbox() {
    const iy = H - 40;
    const g = this.add.graphics();
    g.fillStyle(0x0a0e1a, 0.95);
    g.fillRect(20, iy - 6, W - 40, 34);
    g.lineStyle(1, 0x2a3040, 0.5);
    g.strokeRect(20, iy - 6, W - 40, 34);

    // Create DOM input overlaying the canvas
    const canvas = this.sys.game.canvas;
    const wrap = canvas.parentElement || document.body;

    // Input bar is static HTML below — wired here
    const input = document.getElementById('oracle-input');
    const btn   = document.getElementById('oracle-send');
    const send = () => {
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      fetch('https://api.kurokimachi.com/inbox', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, from: 'ui' }),
      }).catch(() => {});
    };
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    btn.addEventListener('click', send);
  }

  // ── Iter 2: Candle flicker animation ──
  addCandleFlicker() {
    this.time.addEvent({
      delay: 120,
      loop: true,
      callback: () => {
        AGENTS.forEach(agent => {
          const s = this.steleObjects[agent.id];
          if (!s) return;
          const state = this.agentStates[agent.id];
          const baseAlpha = state.online ? 0.8 : 0.25;
          const flicker = baseAlpha + (Math.random() - 0.5) * 0.15;
          s.candleG.setAlpha(Math.max(0.1, Math.min(1, flicker)));
        });
      }
    });
  }

  // ── Brazier ember flicker ──
  addBrazierFlicker() {
    if (!this.brazierPos) return;
    const bp = this.brazierPos;
    // Flickering ember sparks
    const sparks = [];
    for (let i = 0; i < 5; i++) {
      const spark = this.add.graphics();
      spark.fillStyle(PAL.amberBright, 1);
      spark.fillCircle(0, 0, 1);
      spark.setAlpha(0);
      sparks.push(spark);
    }
    this.time.addEvent({
      delay: 300,
      loop: true,
      callback: () => {
        const spark = sparks[Math.floor(Math.random() * sparks.length)];
        const sx = bp.x + (Math.random() - 0.5) * 20;
        const sy = bp.y - 4;
        spark.setPosition(sx, sy);
        spark.setAlpha(0.7 + Math.random() * 0.3);
        this.tweens.add({
          targets: spark,
          x: sx + (Math.random() - 0.5) * 10,
          y: sy - 10 - Math.random() * 15,
          alpha: 0,
          duration: 600 + Math.random() * 600,
          ease: 'Quad.easeOut'
        });
      }
    });
  }

  // ── Iter 5: Incense smoke particles from brazier (enhanced) ──
  addIncenseSmoke() {
    this.smokeParticles = [];
    const bx = W / 2, by = GRID_Y + 1.5 * (STELE_H + GAP_Y) - 10;

    // Three layers: small warm, medium mid, large cool
    const layers = [
      { count: 8, sizeMin: 1.5, sizeMax: 3, color: 0x6a5040, maxAlpha: 0.30, speedMin: 0.35, speedMax: 0.5, maxLife: 2500 },
      { count: 6, sizeMin: 3, sizeMax: 5, color: 0x5a5068, maxAlpha: 0.18, speedMin: 0.25, speedMax: 0.4, maxLife: 4000 },
      { count: 4, sizeMin: 5, sizeMax: 8, color: 0x4a4860, maxAlpha: 0.08, speedMin: 0.15, speedMax: 0.3, maxLife: 5500 },
    ];

    layers.forEach((layer, li) => {
      for (let i = 0; i < layer.count; i++) {
        const size = layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin);
        const smoke = this.add.graphics();
        smoke.fillStyle(layer.color, 1);
        smoke.fillCircle(0, 0, size);
        smoke.setAlpha(0);

        this.smokeParticles.push({
          gfx: smoke,
          x: bx + (Math.random() - 0.5) * 14,
          y: by - 6,
          speed: layer.speedMin + Math.random() * (layer.speedMax - layer.speedMin),
          drift: (Math.random() - 0.5) * 0.3,
          wobblePhase: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.002 + Math.random() * 0.002,
          wobbleAmp: 0.4 + Math.random() * 0.6,
          life: li * 600 + i * 350 + Math.random() * 200,
          maxLife: layer.maxLife + Math.random() * 1500,
          maxAlpha: layer.maxAlpha,
          originX: bx,
          originY: by - 6,
        });
      }
    });

    this.time.addEvent({
      delay: 40,
      loop: true,
      callback: () => {
        this.smokeParticles.forEach(p => {
          p.life += 40;
          if (p.life > p.maxLife) {
            p.life = 0;
            p.x = p.originX + (Math.random() - 0.5) * 14;
            p.y = p.originY;
            p.drift = (Math.random() - 0.5) * 0.3;
            p.wobblePhase = Math.random() * Math.PI * 2;
          }
          const progress = p.life / p.maxLife;
          p.y -= p.speed;
          // Natural sinusoidal drift + slight acceleration sideways
          p.x += p.drift + Math.sin(p.wobblePhase + p.life * p.wobbleSpeed) * p.wobbleAmp;
          // Smoke expands slightly as it rises
          const scale = 1 + progress * 0.8;
          p.gfx.setScale(scale);
          // Fade in quickly, sustain, fade out slowly
          const alpha = progress < 0.08 ? progress / 0.08 :
                        progress < 0.4 ? 1 :
                        Math.pow(1 - (progress - 0.4) / 0.6, 1.5);
          p.gfx.setPosition(p.x, p.y);
          p.gfx.setAlpha(alpha * p.maxAlpha);
        });
      }
    });
  }

  // ── Iter 7: Snowfall past the window ──
  addSnowfall() {
    const wp = this.windowPos;
    if (!wp) return;

    // Geometry mask to clip snowflakes to window
    const maskShape = this.make.graphics({ x: 0, y: 0, add: false });
    maskShape.fillStyle(0xffffff);
    maskShape.fillRect(wp.x - wp.w / 2, wp.y - wp.h / 2, wp.w, wp.h);
    const snowMask = maskShape.createGeometryMask();

    const snowContainer = this.add.container(0, 0);
    snowContainer.setMask(snowMask);

    for (let i = 0; i < 15; i++) {
      const flake = this.add.graphics();
      flake.fillStyle(PAL.snow, 1);
      flake.fillCircle(0, 0, 0.8 + Math.random() * 0.8);

      const startX = wp.x - wp.w / 2 + Math.random() * wp.w;
      const startY = wp.y - wp.h / 2 + Math.random() * wp.h;
      flake.setPosition(startX, startY);
      flake.setAlpha(0.4 + Math.random() * 0.4);

      snowContainer.add(flake);

      this.tweens.add({
        targets: flake,
        x: startX + (Math.random() - 0.5) * 20 - 5,
        y: wp.y + wp.h / 2 + 5,
        duration: 2000 + Math.random() * 3000,
        delay: i * 300,
        repeat: -1,
        onRepeat: () => {
          flake.setPosition(
            wp.x - wp.w / 2 + Math.random() * wp.w,
            wp.y - wp.h / 2 - 2
          );
        }
      });
    }
  }

  // ── Iter 10: Ambient dust motes (enhanced) ──
  addAmbientParticles() {
    // Warm dust near brazier
    for (let i = 0; i < 4; i++) {
      const mote = this.add.graphics();
      mote.fillStyle(0xc0a060, 1);
      mote.fillCircle(0, 0, 0.6 + Math.random() * 0.4);

      const sx = W / 2 + (Math.random() - 0.5) * 120;
      const sy = this.brazierPos ? this.brazierPos.y - 20 + Math.random() * 40 : 300;
      mote.setPosition(sx, sy);

      this.tweens.add({
        targets: mote,
        x: sx + (Math.random() - 0.5) * 40,
        y: sy - 30 - Math.random() * 40,
        alpha: { from: 0, to: 0.25 },
        duration: 5000 + Math.random() * 3000,
        delay: i * 1200,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
      });
    }

    // Cool dust in periphery
    for (let i = 0; i < 5; i++) {
      const mote = this.add.graphics();
      mote.fillStyle(0x6070a0, 1);
      mote.fillCircle(0, 0, 0.5 + Math.random() * 0.5);

      const sx = 50 + Math.random() * (W - 100);
      const sy = 100 + Math.random() * (H - 200);
      mote.setPosition(sx, sy);

      this.tweens.add({
        targets: mote,
        x: sx + (Math.random() - 0.5) * 25,
        y: sy - 15 - Math.random() * 25,
        alpha: { from: 0, to: 0.18 },
        duration: 6000 + Math.random() * 4000,
        delay: i * 1000,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
      });
    }
  }

  // ══════════════════════════════════════════════
  // SSE CONNECTION — Iter 3, 4, 6
  // ══════════════════════════════════════════════

  connectSSE() {
    // Live indicator
    this.liveDot = this.add.graphics();
    this.liveLabel = this.add.text(W - 40, H - 18, 'LIVE', {
      fontFamily: 'monospace', fontSize: '9px', color: '#40e040'
    }).setAlpha(0.5);
    this.sseConnected = false;
    this.drawLiveDot();

    // Pulse the dot
    this.time.addEvent({ delay: 800, loop: true, callback: () => {
      if (this.sseConnected) {
        this.liveDot.setAlpha(this.liveDot.alpha > 0.5 ? 0.35 : 1);
      }
    }});

    this.startSSE();
  }

  drawLiveDot() {
    this.liveDot.clear();
    const color = this.sseConnected ? 0x40e040 : 0x808080;
    this.liveDot.fillStyle(color, 1);
    this.liveDot.fillCircle(W - 50, H - 14, 4);
    this.liveLabel.setText(this.sseConnected ? 'LIVE' : 'OFFLINE');
    this.liveLabel.setColor(this.sseConnected ? '#40e040' : '#808080');
  }

  startSSE() {
    try {
      const es = new EventSource('https://api.kurokimachi.com/events');
      es.onopen = () => {
        this.sseConnected = true;
        this.drawLiveDot();
      };
      es.onerror = () => {
        this.sseConnected = false;
        this.drawLiveDot();
        es.close();
        this.time.delayedCall(3000, () => this.startSSE());
      };
      es.onmessage = (e) => this.handleSSE(e);
      es.addEventListener('message', (e) => this.handleSSE(e));
      es.addEventListener('state:sync', (e) => this.handleSSE(e));
      es.addEventListener('agent:speak', (e) => this.handleSSE(e));
      es.addEventListener('agent:online', (e) => this.handleSSE(e));
      es.addEventListener('agent:offline', (e) => this.handleSSE(e));
      es.addEventListener('user:message', (e) => this.handleSSE(e));
    } catch (err) {
      this.time.delayedCall(3000, () => this.startSSE());
    }
  }

  handleSSE(e) {
    try {
      const data = JSON.parse(e.data);
      const type = data.type || data.event;
      const agentId = data.agentId || (data.meta && data.meta.agentId);
      const message = data.content || (data.meta && data.meta.message) || '';

      if (type === 'user:message') {
        const uMsg = data.payload?.message || data.content || message;
        this.onUserMessage(uMsg);
      }
      if (type === 'agent:speak' && agentId) {
        this.onAgentSpeak(agentId, message);
      }
      if (type === 'agent:online' && agentId) {
        this.onAgentOnline(agentId);
      }
      if (type === 'agent:offline' && agentId) {
        this.onAgentOffline(agentId);
      }

      // gazette inside state:sync
      if (data.gazette && Array.isArray(data.gazette)) {
        data.gazette.forEach(item => {
          const iType = item.type || item.event;
          const iAgent = item.agentId || (item.meta && item.meta.agentId);
          const iMsg = item.content || (item.meta && item.meta.message) || '';
          if (iType === 'agent:speak' && iAgent) this.onAgentSpeak(iAgent, iMsg);
          if (iType === 'agent:online' && iAgent) this.onAgentOnline(iAgent);
          if (iType === 'agent:offline' && iAgent) this.onAgentOffline(iAgent);
        });
      }
    } catch (err) { /* ignore parse errors */ }
  }

  // ── User message → show in ticker ──
  onUserMessage(message) {
    this.lastUserMessageTime = Date.now();
    const truncMsg = message.length > 60 ? message.substring(0, 60) + '…' : message;
    const fullText = `🖊 You → ${truncMsg}`;

    this.tickerText.setText('');
    let idx = 0;
    if (this.tickerTimer) this.tickerTimer.remove();
    this.tickerTimer = this.time.addEvent({
      delay: 30,
      repeat: fullText.length - 1,
      callback: () => {
        idx++;
        this.tickerText.setText(fullText.substring(0, idx));
      }
    });
  }

  // ── Iter 3: Agent speak → stele pulse ──
  // ── Iter 4: Ink brushstroke text animation ──
  onAgentSpeak(agentId, message) {
    const s = this.steleObjects[agentId];
    if (!s) return;

    const state = this.agentStates[agentId];
    if (state) {
      state.lastSpoke = Date.now();
      state.lastMessage = message;
    }

    // Enhanced glow if Scarlet is responding to a user instruction (within 60s)
    const isResponse = agentId === 'scarlet' && this.lastUserMessageTime &&
      (Date.now() - this.lastUserMessageTime < 60000);
    const glowAlpha = isResponse ? 0.4 : 0.2;
    const glowRadius = isResponse ? STELE_W * 0.8 : STELE_W * 0.6;
    const glowDuration = isResponse ? 4000 : 2000;

    // Amber pulse on stele
    s.glowG.clear();
    s.glowG.fillStyle(PAL.amberBright, glowAlpha);
    s.glowG.fillRect(s.bx + 4, s.by, s.bw - 8, s.bh);
    s.glowG.fillStyle(PAL.amberBright, glowAlpha * 0.4);
    s.glowG.fillCircle(s.cx, s.cy, glowRadius);
    s.glowG.setAlpha(1);

    this.tweens.add({
      targets: s.glowG,
      alpha: { from: 1, to: 0 },
      duration: glowDuration,
      ease: 'Sine.easeOut'
    });

    // Candle flare
    s.candleG.setAlpha(1);
    this.tweens.add({
      targets: s.candleG,
      alpha: { from: 1, to: state && state.online ? 0.8 : 0.25 },
      duration: 1500
    });

    // Ink text animation (Iter 4)
    const truncMsg = message.length > 40 ? message.substring(0, 40) + '…' : message;
    s.inkText.setText('');
    s.inkText.setAlpha(1);

    // Typewriter: reveal characters one by one
    let charIdx = 0;
    const typeTimer = this.time.addEvent({
      delay: 60,
      repeat: truncMsg.length - 1,
      callback: () => {
        charIdx++;
        s.inkText.setText(truncMsg.substring(0, charIdx));
      }
    });

    // Fade out after a few seconds
    this.time.delayedCall(4000, () => {
      this.tweens.add({
        targets: s.inkText,
        alpha: 0,
        duration: 1500
      });
    });

    // Iter 9: Update ticker with typewriter
    this.updateTicker(agentId, message);

    // Push to recent messages
    this.recentMessages.push({ agentId, message, time: Date.now() });
    if (this.recentMessages.length > 20) this.recentMessages.shift();
  }

  // ── Iter 6: Online/offline state ──
  onAgentOnline(agentId) {
    const state = this.agentStates[agentId];
    if (state) state.online = true;

    const s = this.steleObjects[agentId];
    if (!s) return;

    // Warm glowing status dot
    s.statusDot.clear();
    s.statusDot.fillStyle(PAL.amberGlow, 0.9);
    s.statusDot.fillCircle(s.cx, s.pos.y + STELE_H + 4, 4);
    // Warm ring
    s.statusRing.clear();
    s.statusRing.lineStyle(1.5, PAL.amberGlow, 0.5);
    s.statusRing.strokeCircle(s.cx, s.pos.y + STELE_H + 4, 7);
    // Ambient halo under status
    s.statusDot.fillStyle(PAL.amberGlow, 0.06);
    s.statusDot.fillCircle(s.cx, s.pos.y + STELE_H + 4, 14);
    // Warm name color
    s.nameText.setColor('#c0a060');

    // Start breathing glow for online agents
    if (s._breathTween) s._breathTween.stop();
    s._breathTween = this.tweens.add({
      targets: s.statusDot,
      alpha: { from: 1, to: 0.5 },
      duration: 2000,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });

    // Brief warm pulse on stele body
    s.glowG.clear();
    s.glowG.fillStyle(PAL.warmGlow, 0.15);
    s.glowG.fillRect(s.bx + 4, s.by, s.bw - 8, s.bh);
    s.glowG.setAlpha(1);
    this.tweens.add({
      targets: s.glowG,
      alpha: 0,
      duration: 2000,
      ease: 'Sine.easeOut'
    });
  }

  onAgentOffline(agentId) {
    const state = this.agentStates[agentId];
    if (state) state.online = false;

    const s = this.steleObjects[agentId];
    if (!s) return;

    // Stop breathing
    if (s._breathTween) { s._breathTween.stop(); s._breathTween = null; }

    // Cold grey status dot — smaller, dimmer
    s.statusDot.clear();
    s.statusDot.fillStyle(PAL.coldGlow, 0.3);
    s.statusDot.fillCircle(s.cx, s.pos.y + STELE_H + 4, 3);
    s.statusDot.setAlpha(1);
    // Dim ring
    s.statusRing.clear();
    s.statusRing.lineStyle(1, PAL.coldGlow, 0.15);
    s.statusRing.strokeCircle(s.cx, s.pos.y + STELE_H + 4, 6);
    // Dim name
    s.nameText.setColor('#2a3444');
    // Dim candle
    s.candleG.setAlpha(0.15);
  }

  // ── Iter 9: Ticker typewriter ──
  updateTicker(agentId, message) {
    const agent = AGENTS.find(a => a.id === agentId);
    const prefix = agent ? `${agent.emoji} ${agent.name}` : agentId;
    const truncMsg = message.length > 60 ? message.substring(0, 60) + '…' : message;
    const fullText = `${prefix} — ${truncMsg}`;

    this.tickerText.setText('');
    let idx = 0;
    if (this.tickerTimer) this.tickerTimer.remove();

    this.tickerTimer = this.time.addEvent({
      delay: 30,
      repeat: fullText.length - 1,
      callback: () => {
        idx++;
        this.tickerText.setText(fullText.substring(0, idx));
      }
    });
  }
}
